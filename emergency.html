<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Emergency Medicine</title>

<style>
body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#07131f;
color:white;
}

.box{
width:360px;
padding:30px;
border-radius:25px;
background:#0d1f33;
box-shadow:0 0 25px #00bfff;
text-align:center;
}

input{
width:100%;
padding:16px;
font-size:22px;
border:none;
border-radius:14px;
margin-bottom:18px;
text-align:center;
}

button{
width:100%;
padding:16px;
font-size:24px;
border:none;
border-radius:14px;
background:#00ccff;
color:white;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
<h1>Emergency Medicine</h1>

<input type="password" id="pass" placeholder="Password">

<button onclick="go()">Login</button>
</div>

<script>
function go(){
if(document.getElementById("pass").value=="11223344"){
window.location.href="portal.html";
}else{
alert("Wrong Password");
}
}
</script>

</body>
</html>
