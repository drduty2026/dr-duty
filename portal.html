<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dr_Duty</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:flex-end;
align-items:center;
padding-right:6%;
background:
linear-gradient(rgba(0,10,40,.45),rgba(0,10,40,.45)),
url('https://images.unsplash.com/photo-1576091160399-112ba8d25d1d?auto=format&fit=crop&w=1400&q=80');
background-size:cover;
background-position:center;
color:white;
}

.card{
width:420px;
padding:30px;
border-radius:28px;
background:rgba(0,30,80,.35);
backdrop-filter:blur(14px);
border:1px solid rgba(0,180,255,.45);
box-shadow:0 0 25px rgba(0,170,255,.45);
text-align:center;
}

.hospital{
font-size:26px;
font-weight:bold;
margin-bottom:8px;
}

.eng{
font-size:18px;
color:#8fe8ff;
margin-bottom:18px;
}

.logo{
font-size:58px;
font-weight:bold;
margin-bottom:16px;
}

.spec{
font-size:34px;
color:#47f4ff;
font-weight:bold;
margin-bottom:18px;
}

.name{
font-size:24px;
margin-bottom:16px;
}

.phone{
font-size:22px;
margin-bottom:20px;
}

.btn{
display:block;
text-decoration:none;
padding:18px;
margin-top:14px;
border-radius:18px;
font-size:28px;
font-weight:bold;
color:white;
}

.call{
background:linear-gradient(90deg,#0048ff,#22d7ff);
}

.wa{
background:linear-gradient(90deg,#00aa22,#32ff57);
}

.time{
margin-top:18px;
font-size:18px;
color:#d8ffff;
}
</style>
</head>

<body>

<div class="card">

<div class="hospital">مستشفى الموانى العام</div>
<div class="eng">Al-Mawani General Hospital</div>

<div class="logo">Dr_Duty</div>

<div class="spec">Emergency Medicine</div>

<div class="name">Dr. Mohammed Naser</div>

<div class="phone">9647805871273</div>

<a class="btn call" href="tel:+9647805871273">📞 Call</a>

<a class="btn wa" href="https://wa.me/9647805871273">💬 WhatsApp</a>

<div class="time" id="clock"></div>

</div>

<script>
function updateClock(){
const now=new Date();

let d=String(now.getDate()).padStart(2,'0');
let m=String(now.getMonth()+1).padStart(2,'0');
let y=now.getFullYear();

let h=now.getHours();
let min=String(now.getMinutes()).padStart(2,'0');

let ampm=h>=12?'PM':'AM';
h=h%12;
h=h?h:12;

document.getElementById("clock").innerHTML=
Updated: ${d}/${m}/${y} ${h}:${min} ${ampm};
}
setInterval(updateClock,1000);
updateClock();
</script>

</body>
</html>
