<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dr Duty Portal</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url("https://images.unsplash.com/photo-1584515933487-779824d29309?auto=format&fit=crop&w=1200&q=80") center/cover no-repeat;
overflow:hidden;
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.45);
backdrop-filter:blur(5px);
}

.card{
position:relative;
z-index:2;
width:92%;
max-width:700px;
background:rgba(20,20,30,0.58);
padding:30px;
border-radius:30px;
text-align:center;
color:#fff;
box-shadow:0 0 35px rgba(0,255,255,.25);
}

#hospitalAr{
font-size:44px;
font-weight:bold;
margin-bottom:8px;
}

#hospitalEn{
font-size:22px;
color:#9ef8ff;
margin-bottom:25px;
}

#mainTitle{
font-size:72px;
font-weight:bold;
margin-bottom:10px;
}

#specialtyName{
font-size:44px;
font-weight:bold;
color:#37f6ff;
margin-bottom:18px;
}

#doctorName{
font-size:34px;
margin-bottom:10px;
}

#phone{
font-size:28px;
margin-bottom:20px;
}

.btn{
display:block;
text-decoration:none;
padding:18px;
margin:14px 0;
border-radius:18px;
font-size:34px;
font-weight:bold;
color:white;
}

.call{
background:linear-gradient(90deg,#0051ff,#19d8ff);
}

.whats{
background:#25d900;
}

.date{
margin-top:18px;
font-size:22px;
}

@media(max-width:700px){
#hospitalAr{font-size:30px;}
#hospitalEn{font-size:18px;}
#mainTitle{font-size:56px;}
#specialtyName{font-size:34px;}
#doctorName{font-size:26px;}
#phone{font-size:22px;}
.btn{font-size:28px;}
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="card">

<div id="hospitalAr">جاري التحميل...</div>
<div id="hospitalEn"></div>

<div id="mainTitle">Dr_Duty</div>

<div id="specialtyName">Loading...</div>

<div id="doctorName"></div>

<div id="phone"></div>

<a id="callBtn" class="btn call" href="#">📞 Call</a>

<a id="waBtn" class="btn whats" href="#">💬 WhatsApp</a>

<div id="today" class="date"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDQqQpACfdiq-i1q-hv9auGjEkSeHhMIuc",
authDomain: "dr-duty.firebaseapp.com",
projectId: "dr-duty",
storageBucket: "dr-duty.firebasestorage.app",
messagingSenderId: "1051471488231",
appId: "1:1051471488231:web:d9abfafee31373ec826e42"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
let spec = (params.get("spec") || "Emergency Medicine").trim();

spec = decodeURIComponent(spec);

document.getElementById("specialtyName").innerText = spec;

async function loadDuty(){

try{

const ref = doc(db,"Duties",spec);
const snap = await getDoc(ref);

if(snap.exists()){

const data = snap.data();

document.getElementById("hospitalAr").innerText =
data.hospitalAr || "";

document.getElementById("hospitalEn").innerText =
data.hospitalEn || "";

document.getElementById("doctorName").innerText =
data["Doctor Name"] || "";

document.getElementById("phone").innerText =
data.phone || "";

document.getElementById("callBtn").href =
"tel:" + (data.phone || "");

document.getElementById("waBtn").href =
"https://wa.me/" + (data.whatsapp  data.phone  "");

}else{

document.getElementById("hospitalAr").innerText =
"لا توجد بيانات";

document.getElementById("doctorName").innerText = "";
document.getElementById("phone").innerText = "";

}

}catch(error){

document.getElementById("hospitalAr").innerText =
"خطأ بالاتصال";

console.log(error);

}

}

loadDuty();

const now = new Date();

document.getElementById("today").innerText =
"Updated: "
+ now.getDate() + "/"
+ (now.getMonth()+1) + "/"
+ now.getFullYear();

</script>

</body>
</html>
