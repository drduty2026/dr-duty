<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr Duty Portal</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url('https://images.unsplash.com/photo-1584515933487-779824d29309?auto=format&fit=crop&w=1200&q=80') center/cover no-repeat;
position:relative;
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,.45);
backdrop-filter:blur(3px);
}

.card{
position:relative;
z-index:2;
width:95%;
max-width:520px;
padding:35px 25px;
border-radius:30px;
background:rgba(20,20,30,.55);
backdrop-filter:blur(12px);
text-align:center;
color:#fff;
box-shadow:0 0 25px rgba(0,255,255,.25);
}

#hospitalAr{
font-size:42px;
font-weight:bold;
margin-bottom:8px;
}

#hospitalEn{
font-size:22px;
color:#9ff8ff;
margin-bottom:25px;
}

#mainTitle{
font-size:72px;
font-weight:bold;
margin-bottom:10px;
}

#specialtyName{
font-size:48px;
color:#35f3ff;
font-weight:bold;
margin-bottom:20px;
}

#doctorName{
font-size:34px;
margin-bottom:10px;
}

#phone{
font-size:28px;
margin-bottom:25px;
}

.btn{
display:block;
width:100%;
padding:18px;
border-radius:18px;
text-decoration:none;
font-size:34px;
font-weight:bold;
margin-bottom:15px;
color:#fff;
}

.call{
background:linear-gradient(90deg,#0057ff,#11d8ff);
}

.whats{
background:#24f000;
color:#fff;
}

.date{
margin-top:10px;
font-size:26px;
opacity:.9;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="card">

<div id="hospitalAr">جاري التحميل...</div>
<div id="hospitalEn"></div>

<div id="mainTitle">Dr_Duty</div>

<div id="specialtyName">Loading...</div>

<div id="doctorName"></div>

<div id="phone"></div>

<a class="btn call" id="callBtn" href="#">📞 Call</a>

<a class="btn whats" id="waBtn" href="#">💬 WhatsApp</a>

<div class="date" id="today"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDQqQpACfdiq-i1q-hv9auGjEkSeHhMIuc",
authDomain: "dr-duty.firebaseapp.com",
projectId: "dr-duty",
storageBucket: "dr-duty.firebasestorage.app",
messagingSenderId: "1051471488231",
appId: "1:1051471488231:web:d9abfafee31373ec826e42"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const spec = params.get("spec") || "Emergency";

document.getElementById("specialtyName").innerText = spec;

async function loadDuty(){

const ref = doc(db,"Duties",spec);
const snap = await getDoc(ref);

if(snap.exists()){

const data = snap.data();

document.getElementById("hospitalAr").innerText =
data.hospitalAr || "مستشفى غير معروف";

document.getElementById("hospitalEn").innerText =
data.hospitalEn || "Unknown Hospital";

document.getElementById("doctorName").innerText =
data["Doctor Name"] || "";

document.getElementById("phone").innerText =
data.phone || "";

document.getElementById("callBtn").href =
"tel:" + (data.phone || "");

document.getElementById("waBtn").href =
"https://wa.me/" + (data.whatsapp || "");

}

}

loadDuty();

const now = new Date();

document.getElementById("today").innerText =
"Updated: " +
now.getDate() + "/" +
(now.getMonth()+1) + "/" +
now.getFullYear();

</script>

</body>
</html>
