<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dr Duty QR Codes</title>

<style>
body{
margin:0;
padding:20px;
font-family:Arial,Helvetica,sans-serif;
background:#ffffff;
text-align:center;
color:#000;
}

h1{
font-size:34px;
margin-bottom:8px;
}

.sub{
font-size:16px;
color:#666;
margin-bottom:25px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

.card{
border:1px solid #ddd;
border-radius:12px;
padding:12px;
background:#fff;
}

.title{
font-size:18px;
font-weight:bold;
margin-bottom:10px;
}

img{
width:180px;
height:180px;
object-fit:contain;
}

.small{
font-size:11px;
margin-top:8px;
color:#666;
word-break:break-word;
}

@media print{
body{padding:8px;}
}
</style>
</head>
<body>

<h1>Dr Duty QR Codes</h1>
<div class="sub">Chrome → Print → Save as PDF</div>

<div class="grid" id="grid"></div>

<script>

const deps = [

"Emergency Medicine",
"Internal Medicine",
"Surgery",
"Pediatrics",
"Orthopedics",
"Cardiology",
"Neurology",
"Nephrology",
"ENT",
"Ophthalmology",
"Dermatology",
"Psychiatry",
"Radiology",
"Anesthesia",
"Urology",
"Gynecology",
"Oncology",
"ICU",
"Family Medicine",
"Dental"

];

const base =
"https://drduty2026.github.io/dr-duty/portal.html?spec=";

const grid = document.getElementById("grid");

deps.forEach(dep=>{

const url = base + encodeURIComponent(dep);

const qr =
"https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=" +
encodeURIComponent(url);

const card = document.createElement("div");
card.className = "card";

card.innerHTML = 
<div class="title">${dep}</div>
<img src="${qr}">
<div class="small">Dr Duty</div>
;

grid.appendChild(card);

});

</script>

</body>
</html>
