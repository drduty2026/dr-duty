<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dr Duty QR Codes</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
margin:0;
padding:30px;
font-family:Arial;
background:#ffffff;
text-align:center;
}

h1{
font-size:42px;
margin-bottom:10px;
}

p{
font-size:22px;
color:#555;
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:25px;
max-width:1200px;
margin:auto;
}

.card{
border:2px solid #ddd;
padding:15px;
border-radius:16px;
background:#fff;
}

.name{
font-size:22px;
font-weight:bold;
margin-bottom:10px;
}

.qr{
width:180px;
height:180px;
margin:auto;
}

.url{
font-size:13px;
margin-top:10px;
word-break:break-all;
color:#666;
}

.printBtn{
margin-top:30px;
padding:18px 45px;
font-size:24px;
border:none;
border-radius:16px;
background:#00bfff;
color:#fff;
font-weight:bold;
cursor:pointer;
}

@media print{
.printBtn,p{
display:none;
}
body{
padding:10px;
}
}

</style>
</head>

<body>

<h1>Dr Duty QR Codes</h1>
<p>Print or Save as PDF</p>

<div class="grid" id="grid"></div>

<button class="printBtn" onclick="window.print()">Print / PDF</button>

<script>

const departments = [
"Emergency Medicine",
"Internal Medicine",
"Surgery",
"Pediatrics",
"Gynecology",
"Orthopedics",
"Cardiology",
"Dermatology",
"Neurology",
"ENT",
"Ophthalmology",
"Radiology",
"Urology",
"Anesthesia",
"Psychiatry",
"Oncology",
"Nephrology",
"Gastroenterology",
"Pulmonology",
"Endocrinology",
"Rheumatology",
"Infectious Disease",
"Hematology",
"Plastic Surgery",
"Vascular Surgery",
"Family Medicine",
"ICU",
"CCU",
"Burn Unit",
"Neurosurgery",
"Maxillofacial",
"Pathology",
"Laboratory"
];

const base="https://drduty2026.github.io/dr-duty/portal.html?spec=";

const grid=document.getElementById("grid");

departments.forEach((dep,i)=>{

let url=base+encodeURIComponent(dep);

let card=document.createElement("div");
card.className="card";

card.innerHTML=
<div class="name">${dep}</div>
<div class="qr" id="q${i}"></div>
<div class="url">${url}</div>
;

grid.appendChild(card);

new QRCode(document.getElementById("q"+i),{
text:url,
width:180,
height:180
});

});

</script>

</body>
</html>
