<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dr Duty QR Print</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body{
margin:0;
padding:20px;
font-family:Arial,Helvetica,sans-serif;
background:white;
color:black;
text-align:center;
}

h1{
font-size:34px;
margin-bottom:8px;
}

.sub{
font-size:16px;
margin-bottom:25px;
color:#555;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
}

.card{
border:1px solid #ddd;
padding:12px;
border-radius:12px;
page-break-inside:avoid;
}

.title{
font-size:18px;
font-weight:bold;
margin-bottom:10px;
}

canvas{
width:100%;
height:auto;
}

.small{
font-size:11px;
margin-top:6px;
word-break:break-word;
color:#666;
}

@media(max-width:900px){
.grid{
grid-template-columns:repeat(2,1fr);
}
}

@media(max-width:600px){
.grid{
grid-template-columns:1fr;
}
}

@media print{
body{
padding:8px;
}
h1,.sub{
margin:5px;
}
}
</style>
</head>
<body>

<h1>Dr Duty QR Codes</h1>
<div class="sub">Use Chrome → Print → Save as PDF</div>

<div class="grid" id="grid"></div>

<script>

const deps = [

"Emergency Medicine",
"Internal Medicine",
"Surgery",
"Pediatrics",
"Orthopedics",
"Cardiology",
"Neurology",
"Nephrology",
"ENT",
"Ophthalmology",
"Dermatology",
"Psychiatry",
"Radiology",
"Anesthesia",
"Urology",
"Gynecology",
"Oncology",
"ICU",
"Family Medicine",
"Dental"

];

const base =
"https://drduty2026.github.io/dr-duty/portal.html?spec=";

const grid = document.getElementById("grid");

deps.forEach(dep=>{

const url = base + encodeURIComponent(dep);

const card = document.createElement("div");
card.className = "card";

card.innerHTML = 
<div class="title">${dep}</div>
<canvas></canvas>
<div class="small">Dr Duty</div>
;

grid.appendChild(card);

QRCode.toCanvas(
card.querySelector("canvas"),
url,
{
width:180,
margin:1
}
);

});

</script>

</body>
</html>
