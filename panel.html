<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dr Duty Panel</title>

<style>
body{
margin:0;
font-family:Arial;
background:#081a35;
color:white;
padding:20px;
}

.box{
max-width:700px;
margin:auto;
background:#10284f;
padding:20px;
border-radius:20px;
}

input,select{
width:100%;
padding:14px;
margin:8px 0;
border:none;
border-radius:10px;
font-size:16px;
}

button{
padding:12px 20px;
background:#2d66ff;
color:white;
border:none;
border-radius:10px;
font-size:18px;
margin-top:10px;
}

.card{
background:#173764;
padding:18px;
border-radius:18px;
margin-top:20px;
}
</style>
</head>

<body>

<div class="box">

<h1>Dr Duty Control Panel</h1>

<div class="card">
<h2>Hospital Name</h2>
<input placeholder="Hospital Name">
<button>Save</button>
</div>

<div class="card">
<h2>Add / Edit Doctor</h2>
<input placeholder="Doctor Name">
<select>
<option>اختصاص 1</option>
<option>اختصاص 2</option>
<option>اختصاص 3</option>
<option>اختصاص 4</option>
</select>
<input placeholder="Phone Number">
<button>Save Doctor</button>
</div>

<button onclick="logout()">Logout</button>

</div>

<script>
function logout(){
  window.location.href="admin.html";
}
</script>

</body>
</html>
