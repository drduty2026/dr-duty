<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Panel</title>

<style>
body{
margin:0;
font-family:Arial;
background:#081a35;
color:white;
padding:20px;
}
.box{
max-width:700px;
margin:auto;
background:#10284f;
padding:20px;
border-radius:20px;
}
.card{
background:#173764;
padding:20px;
margin-top:20px;
border-radius:20px;
}
input,select{
width:100%;
padding:14px;
margin:8px 0;
border:none;
border-radius:10px;
font-size:18px;
}
button{
width:100%;
padding:14px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
font-size:18px;
margin-top:10px;
}
</style>
</head>

<body>

<script>
if(localStorage.getItem("login")!="yes"){
window.location.href="admin.html";
}
</script>

<div class="box">

<h1>Dr Duty Control Panel</h1>

<div class="card">
<h2>Hospital Name</h2>
<input placeholder="Hospital Name">
<button>Save</button>
</div>

<div class="card">
<h2>Add / Edit Doctor</h2>

<input placeholder="Doctor Name">

<select>
<option>باطنية</option>
<option>جراحة عامة</option>
<option>أطفال</option>
<option>نسائية وتوليد</option>
<option>عظام</option>
<option>أنف وأذن وحنجرة</option>
<option>جلدية</option>
<option>عيون</option>
<option>قلبية</option>
<option>أعصاب</option>
<option>مسالك بولية</option>
<option>تخدير</option>
<option>أشعة</option>
<option>طوارئ</option>
<option>أسنان</option>
<option>صدرية</option>
<option>أورام</option>
<option>غدد صم</option>
<option>روماتيزم</option>
<option>كلية</option>
<option>جراحة أعصاب</option>
<option>جراحة قلب</option>
<option>تجميل</option>
<option>طب الأسرة</option>
<option>طب المجتمع</option>
<option>نفسية</option>
<option>علاج طبيعي</option>
<option>تأهيل طبي</option>
<option>أمراض دم</option>
<option>مختبرات</option>
<option>طب نووي</option>
<option>عناية مركزة</option>
<option>طب الشيخوخة</option>
</select>

<input placeholder="Phone Number">

<button>Save Doctor</button>
</div>

<button onclick="logout()">Logout</button>

</div>

<script>
function logout(){
localStorage.removeItem("login");
window.location.href="admin.html";
}
</script>

</body>
</html>
