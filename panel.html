<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Panel</title>

<style>
body{
margin:0;
font-family:Arial;
background:#081a35;
color:white;
padding:20px;
}
.box{
max-width:700px;
margin:auto;
background:#10284f;
padding:20px;
border-radius:20px;
}
.card{
background:#173764;
padding:20px;
margin-top:20px;
border-radius:20px;
}
input,select{
width:100%;
padding:14px;
margin:8px 0;
border:none;
border-radius:10px;
font-size:18px;
}
button{
width:100%;
padding:14px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
font-size:18px;
margin-top:10px;
}
</style>
</head>

<body>

<script>
if(localStorage.getItem("login")!="yes"){
window.location.href="admin.html";
}
</script>

<div class="box">

<h1>Dr Duty Control Panel</h1>

<div class="card">
<h2>Add Hospital</h2>

<input id="hospitalInput" placeholder="Hospital Name">
<button onclick="saveHospital()">Save Hospital</button>

<select id="hospitalList"></select>
</div>

<div class="card">
<h2>Add Doctor</h2>

<input id="docName" placeholder="Doctor Name">
<input id="docPhone" placeholder="Phone Number">

<button onclick="saveDoctor()">Save Doctor</button>

<select id="doctorList" onchange="showPhone()"></select>

<input id="phoneShow" placeholder="Phone Number" readonly>
</div>

<button onclick="logout()">Logout</button>

</div>

<script>

function loadHospitals(){
let data=JSON.parse(localStorage.getItem("hospitals")||"[]");
let list=document.getElementById("hospitalList");
list.innerHTML="";
data.forEach(h=>{
list.innerHTML += "<option>"+h+"</option>";
});
}

function saveHospital(){
let name=document.getElementById("hospitalInput").value.trim();
if(name=="") return;

let data=JSON.parse(localStorage.getItem("hospitals")||"[]");
data.push(name);
localStorage.setItem("hospitals",JSON.stringify(data));
document.getElementById("hospitalInput").value="";
loadHospitals();
}

function loadDoctors(){
let data=JSON.parse(localStorage.getItem("doctors")||"[]");
let list=document.getElementById("doctorList");
list.innerHTML="";
data.forEach(d=>{
list.innerHTML += "<option>"+d.name+"</option>";
});
}

function saveDoctor(){
let name=document.getElementById("docName").value.trim();
let phone=document.getElementById("docPhone").value.trim();

if(name==""||phone=="") return;

let data=JSON.parse(localStorage.getItem("doctors")||"[]");
data.push({name:name,phone:phone});
localStorage.setItem("doctors",JSON.stringify(data));

document.getElementById("docName").value="";
document.getElementById("docPhone").value="";

loadDoctors();
}

function showPhone(){
let name=document.getElementById("doctorList").value;
let data=JSON.parse(localStorage.getItem("doctors")||"[]");

for(let i=0;i<data.length;i++){
if(data[i].name==name){
document.getElementById("phoneShow").value=data[i].phone;
}
}
}

function logout(){
localStorage.removeItem("login");
window.location.href="admin.html";
}

loadHospitals();
loadDoctors();

</script>

</body>
</html>
