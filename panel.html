<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Panel</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#081a35;
color:#fff;
padding:20px;
}
.box{
max-width:900px;
margin:auto;
background:#10284f;
padding:20px;
border-radius:20px;
}
.card{
background:#173764;
padding:18px;
border-radius:18px;
margin-top:15px;
}
input,select,button{
width:100%;
padding:14px;
margin:8px 0;
border:none;
border-radius:10px;
font-size:17px;
box-sizing:border-box;
}
button{
background:#2563eb;
color:#fff;
font-weight:bold;
cursor:pointer;
}
.red{background:#dc2626;}
.green{background:#16a34a;}
.orange{background:#ea580c;}
</style>
</head>

<body>

<script>
if(localStorage.getItem("session")!=="admin"){
location.href="admin.html";
}
</script>

<div class="box">

<h1>Dr Duty Admin Panel</h1>

<div class="card">
<h2>Hospitals</h2>

<input id="hospitalInput" placeholder="Hospital Name">

<button onclick="addHospital()">Add Hospital</button>

<select id="hospitalList"></select>

<button class="red" onclick="deleteHospital()">Delete Hospital</button>
</div>

<div class="card">
<h2>Doctors Duty</h2>

<select id="specList"></select>

<input id="doctorName" placeholder="Doctor Name">

<input id="doctorPhone" placeholder="Phone Number">

<select id="doctorHospital"></select>

<button onclick="saveDuty()">Save Duty</button>
</div>

<div class="card">
<h2>Assistants</h2>

<input id="aUser" placeholder="Assistant Name">

<input id="aPass" placeholder="Password">

<button class="green" onclick="addAssistant()">Add Assistant</button>

<select id="assistantList"></select>

<button class="orange" onclick="toggleAssistant()">Disable / Enable</button>

<button class="red" onclick="deleteAssistant()">Delete Assistant</button>
</div>

<button class="red" onclick="logout()">Logout</button>

</div>

<script>

/* DATA HELPERS */
function getData(k){
return JSON.parse(localStorage.getItem(k)||"[]");
}
function setData(k,v){
localStorage.setItem(k,JSON.stringify(v));
}

/* 33 SPECIALTIES */
const specs=[
"Emergency Medicine",
"Surgery",
"Internal Medicine",
"Pediatrics",
"Orthopedics",
"ENT",
"Ophthalmology",
"Urology",
"Cardiology",
"Neurosurgery",
"Radiology",
"Dermatology",
"Gynecology",
"Anesthesia",
"Psychiatry",
"Oncology",
"Nephrology",
"Maxillofacial",
"Pediatric Surgery",
"Plastic Surgery",
"Cardiovascular Surgery",
"ICU",
"CCU",
"Medicine F Ward",
"Medicine M Ward",
"Surgery F Ward",
"Surgery M Ward",
"Dialysis Ward",
"Oncology Ward",
"Referral Doctor",
"Emergency Ward Rotating Resident",
"Evening Consultant",
"Emergency Ward Intern Doctor"
];

specs.forEach(x=>{
specList.innerHTML += <option>${x}</option>;
});

/* HOSPITALS */
function loadHospitals(){
let arr=getData("hospitals");

hospitalList.innerHTML="";
doctorHospital.innerHTML="";

arr.forEach(x=>{
hospitalList.innerHTML += <option>${x}</option>;
doctorHospital.innerHTML += <option>${x}</option>;
});
}

function addHospital(){
let v=hospitalInput.value.trim();
if(v==="") return;

let arr=getData("hospitals");
arr.push(v);
setData("hospitals",arr);

hospitalInput.value="";
loadHospitals();
alert("Hospital Added");
}

function deleteHospital(){
let arr=getData("hospitals").filter(x=>x!==hospitalList.value);
setData("hospitals",arr);
loadHospitals();
alert("Deleted");
}

/* DUTIES */
function saveDuty(){

let arr=getData("duties");

arr=arr.filter(x=>x.spec!==specList.value);

arr.push({
spec:specList.value,
name:doctorName.value,
phone:doctorPhone.value,
hospital:doctorHospital.value
});

setData("duties",arr);

alert("Saved Successfully");
}

/* ASSISTANTS */
function loadAssistants(){
let arr=getData("assistants");

assistantList.innerHTML="";

arr.forEach(x=>{
assistantList.innerHTML += <option>${x.user}</option>;
});
}

function addAssistant(){

let arr=getData("assistants");

arr.push({
user:aUser.value,
pass:aPass.value,
active:true
});

setData("assistants",arr);

aUser.value="";
aPass.value="";

loadAssistants();

alert("Assistant Added");
}

function toggleAssistant(){

let arr=getData("assistants");

arr.forEach(x=>{
if(x.user===assistantList.value){
x.active=!x.active;
}
});

setData("assistants",arr);

alert("Updated");
}

function deleteAssistant(){

let arr=getData("assistants").filter(x=>x.user!==assistantList.value);

setData("assistants",arr);

loadAssistants();

alert("Deleted");
}

/* LOGOUT */
function logout(){
localStorage.removeItem("session");
location.href="admin.html";
}

/* START */
loadHospitals();
loadAssistants();

</script>

</body>
</html>
