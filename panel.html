<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dr Duty Panel</title>

<style>
body{
margin:0;
font-family:Arial;
background:#081a35;
color:white;
padding:20px;
}
.box{
max-width:900px;
margin:auto;
background:#10284f;
padding:20px;
border-radius:20px;
}
.card{
background:#173764;
padding:18px;
border-radius:18px;
margin-top:15px;
}
input,select,button{
width:100%;
padding:14px;
margin:8px 0;
border:none;
border-radius:10px;
font-size:17px;
box-sizing:border-box;
}
button{
background:#2563eb;
color:white;
font-weight:bold;
}
.red{background:#dc2626;}
.green{background:#16a34a;}
</style>
</head>

<body>

<div class="box">

<h1>Dr Duty Admin Panel</h1>

<!-- Doctor Directory -->
<div class="card">
<h2>Doctor Directory</h2>

<input id="dirName" placeholder="Doctor Name">
<input id="dirPhone" placeholder="Phone Number">

<button class="green" onclick="saveDoctorDirectory()">Save Doctor</button>
</div>

<!-- Hospital -->
<div class="card">
<h2>Add Hospital</h2>

<input id="hospitalName" placeholder="Hospital Name">

<button onclick="saveHospital()">Save Hospital</button>
</div>

<!-- Duty -->
<div class="card">
<h2>Update Duty</h2>

<select id="spec"></select>

<select id="doctorSelect" onchange="fillDoctor()">
<option value="">Select Saved Doctor</option>
</select>

<input id="doctorName" placeholder="Doctor Name">

<input id="doctorPhone" placeholder="Phone Number">

<select id="hospitalList"></select>

<button onclick="saveDuty()">Save Duty</button>
</div>

<!-- Assistants -->
<div class="card">
<h2>Add Assistant</h2>

<input id="auser" placeholder="Username">
<input id="apass" placeholder="Password">

<button class="green" onclick="saveAssistant()">Save Assistant</button>
</div>

<button class="red" onclick="logout()">Logout</button>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

if(localStorage.getItem("role")!=="admin"){
location.href="admin.html";
}

const firebaseConfig = {
apiKey: "AIzaSyDQqQpACfdiq-i1q-hv9auGjEkSeHhMIuc",
authDomain: "dr-duty.firebaseapp.com",
projectId: "dr-duty",
storageBucket: "dr-duty.firebasestorage.app",
messagingSenderId: "1051471488231",
appId: "1:1051471488231:web:d9abfafee31373ec826e42"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* SPECIALTIES */
const arr = [
"Emergency Medicine","Surgery","Internal Medicine","Pediatrics",
"Orthopedics","ENT","Ophthalmology","Urology","Cardiology",
"Neurosurgery","Radiology","Dermatology","Gynecology",
"Anesthesia","Psychiatry","Oncology","Nephrology",
"Maxillofacial","Pediatric Surgery","Plastic Surgery",
"Cardiovascular Surgery","ICU","CCU","Medicine F Ward",
"Medicine M Ward","Surgery F Ward","Surgery M Ward",
"Dialysis Ward","Oncology Ward","Referral Doctor",
"Emergency Ward Rotating Resident","Evening Consultant",
"Emergency Ward Intern Doctor"
];

for(let i=0;i<arr.length;i++){
spec.innerHTML += "<option>"+arr[i]+"</option>";
}

/* HOSPITALS */
function loadHospitals(){
hospitalList.innerHTML="";
db.collection("Hospitals").get().then(snap=>{
snap.forEach(doc=>{
hospitalList.innerHTML += "<option>"+doc.id+"</option>";
});
});
}

function saveHospital(){
let h=hospitalName.value.trim();
if(h==="") return;

db.collection("Hospitals").doc(h).set({
name:h
}).then(()=>{
hospitalName.value="";
loadHospitals();
alert("Hospital Saved");
});
}

/* DOCTOR DIRECTORY */
function loadDoctors(){
doctorSelect.innerHTML='<option value="">Select Saved Doctor</option>';

db.collection("Doctors").get().then(snap=>{
snap.forEach(doc=>{
doctorSelect.innerHTML += '<option value="'+doc.id+'">'+doc.id+'</option>';
});
});
}

function saveDoctorDirectory(){

let n=dirName.value.trim();
let p=dirPhone.value.trim();

if(n==="") return;

db.collection("Doctors").doc(n).set({
name:n,
phone:p
}).then(()=>{
dirName.value="";
dirPhone.value="";
loadDoctors();
alert("Doctor Saved");
});
}
