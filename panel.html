<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dr Duty Admin Panel</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#081a35;
color:#fff;
padding:20px;
}
.box{
max-width:900px;
margin:auto;
background:#10284f;
padding:20px;
border-radius:20px;
}
.card{
background:#173764;
padding:18px;
border-radius:18px;
margin-top:15px;
}
input,select,button{
width:100%;
padding:14px;
margin:8px 0;
border:none;
border-radius:10px;
font-size:17px;
box-sizing:border-box;
}
button{
background:#2563eb;
color:#fff;
font-weight:bold;
cursor:pointer;
}
.red{background:#dc2626;}
.green{background:#16a34a;}
.msg{
padding:10px;
margin:10px 0;
border-radius:10px;
background:#0f5132;
display:none;
}
</style>
</head>

<body>

<div class="box">

<h1>Dr Duty Admin Panel</h1>

<div id="msg" class="msg"></div>

<div class="card">
<h2>Update Duty</h2>

<select id="hospital"></select>

<select id="spec"></select>

<input id="name" placeholder="Doctor Name">

<input id="phone" placeholder="Phone Number">

<button id="saveBtn">Save Duty</button>
</div>

<div class="card">
<h2>Add Hospital</h2>

<input id="newHospital" placeholder="Hospital Name">

<button id="hospitalBtn" class="green">Save Hospital</button>
</div>

<div class="card">
<h2>Add Assistant</h2>

<input id="auser" placeholder="Username">

<input id="apass" placeholder="Password">

<button id="assistantBtn" class="green">Save Assistant</button>
</div>

<button id="logoutBtn" class="red">Logout</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
doc,
setDoc,
getDocs,
collection
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* حماية الصفحة */
if(localStorage.getItem("role")!=="admin"){
location.href="admin.html";
}

const firebaseConfig = {
apiKey: "AIzaSyDQqQpACfdiq-i1q-hv9auGjEkSeHhMIuc",
authDomain: "dr-duty.firebaseapp.com",
projectId: "dr-duty",
storageBucket: "dr-duty.firebasestorage.app",
messagingSenderId: "1051471488231",
appId: "1:1051471488231:web:d9abfafee31373ec826e42"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const msg = document.getElementById("msg");

function showMsg(t){
msg.style.display="block";
msg.innerText=t;
setTimeout(()=>msg.style.display="none",2500);
}

const specs = [
"Emergency Medicine","Surgery","Internal Medicine","Pediatrics",
"Orthopedics","ENT","Ophthalmology","Urology","Cardiology",
"Neurosurgery","Radiology","Dermatology","Gynecology",
"Anesthesia","Psychiatry","Oncology","Nephrology",
"Maxillofacial","Pediatric Surgery","Plastic Surgery",
"Cardiovascular Surgery","ICU","CCU","Medicine F Ward",
"Medicine M Ward","Surgery F Ward","Surgery M Ward",
"Dialysis Ward","Oncology Ward","Referral Doctor",
"Emergency Ward Rotating Resident","Evening Consultant",
"Emergency Ward Intern Doctor"
];

const spec = document.getElementById("spec");
specs.forEach(x=>{
spec.innerHTML += <option value="${x}">${x}</option>;
});

/* تحميل المستشفيات */
async function loadHospitals(){
const hospital = document.getElementById("hospital");
hospital.innerHTML="";

const snap = await getDocs(collection(db,"Hospitals"));

if(snap.empty){
hospital.innerHTML=<option>No Hospitals</option>;
return;
}

snap.forEach(d=>{
hospital.innerHTML += <option value="${d.id}">${d.id}</option>;
});
}

/* حفظ الطبيب */
document.getElementById("saveBtn").onclick = async ()=>{

await setDoc(doc(db,"Duties",spec.value),{
spec:spec.value,
hospital:document.getElementById("hospital").value,
name:document.getElementById("name").value,
phone:document.getElementById("phone").value,
updated:new Date().toLocaleDateString()
});

showMsg("Duty Saved");
};

/* حفظ مستشفى */
document.getElementById("hospitalBtn").onclick = async ()=>{

let h = document.getElementById("newHospital").value.trim();
if(!h) return;

await setDoc(doc(db,"Hospitals",h),{
name:h
});

document.getElementById("newHospital").value="";
await loadHospitals();

showMsg("Hospital Saved");
};

/* حفظ مساعد */
document.getElementById("assistantBtn").onclick = async ()=>{

let u=document.getElementById("auser").value.trim();
let p=document.getElementById("apass").value.trim();

if(!u || !p) return;

await setDoc(doc(db,"Assistants",u),{
username:u,
password:p,
active:true
});

showMsg("Assistant Saved");
};

/* خروج */
document.getElementById("logoutBtn").onclick = ()=>{
localStorage.removeItem("role");
location.href="admin.html";
};

/* تشغيل */
loadHospitals();

</script>

</body>
</html>
