<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Panel</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#081a35;
color:white;
padding:20px;
}
.box{
max-width:900px;
margin:auto;
background:#10284f;
padding:20px;
border-radius:20px;
}
.card{
background:#173764;
padding:18px;
border-radius:18px;
margin-top:15px;
}
input,select,button{
width:100%;
padding:14px;
margin:8px 0;
border:none;
border-radius:10px;
font-size:17px;
box-sizing:border-box;
}
button{
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
}
.red{background:#dc2626;}
.green{background:#16a34a;}
</style>
</head>

<body>

<div class="box">

<h1>Dr Duty Admin Panel</h1>

<div class="card">

<h2>Update Duty</h2>

<select id="spec"></select>

<input id="name" placeholder="Doctor Name">

<input id="phone" placeholder="Phone Number">

<button onclick="saveDuty()">Save Duty</button>

</div>

<div class="card">

<h2>Add Assistant</h2>

<input id="auser" placeholder="Username">

<input id="apass" placeholder="Password">

<button class="green" onclick="addAssistant()">Save Assistant</button>

</div>

<button class="red" onclick="logout()">Logout</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

if(localStorage.getItem("role")!=="admin"){
location.href="admin.html";
}

const firebaseConfig = {
apiKey: "AIzaSyDQqQpACfdiq-i1q-hv9auGjEkSeHhMIuc",
authDomain: "dr-duty.firebaseapp.com",
projectId: "dr-duty",
storageBucket: "dr-duty.firebasestorage.app",
messagingSenderId: "1051471488231",
appId: "1:1051471488231:web:d9abfafee31373ec826e42"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const specs = [
"Emergency Medicine",
"Surgery",
"Internal Medicine",
"Pediatrics",
"Orthopedics",
"ENT",
"Ophthalmology",
"Urology",
"Cardiology",
"Neurosurgery",
"Radiology",
"Dermatology",
"Gynecology",
"Anesthesia",
"Psychiatry",
"Oncology",
"Nephrology",
"Maxillofacial",
"Pediatric Surgery",
"Plastic Surgery",
"Cardiovascular Surgery",
"ICU",
"CCU",
"Medicine F Ward",
"Medicine M Ward",
"Surgery F Ward",
"Surgery M Ward",
"Dialysis Ward",
"Oncology Ward",
"Referral Doctor",
"Emergency Ward Rotating Resident",
"Evening Consultant",
"Emergency Ward Intern Doctor"
];

specs.forEach(x=>{
document.getElementById("spec").innerHTML += <option>${x}</option>;
});

window.saveDuty = async function(){

let s=spec.value;
let n=name.value;
let p=phone.value;

await setDoc(doc(db,"Duties",s),{
name:n,
phone:p,
spec:s,
updated:new Date().toLocaleDateString()
});

alert("Saved Successfully");

}

window.addAssistant = async function(){

let u=auser.value.trim();
let p=apass.value.trim();

await setDoc(doc(db,"Assistants",u),{
username:u,
password:p,
active:true
});

alert("Assistant Saved");

}

window.logout=function(){
localStorage.removeItem("role");
location.href="admin.html";
}

</script>

</body>
</html>
