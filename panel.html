<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Panel</title>

<style>
body{
margin:0;
font-family:Arial;
background:#081a35;
color:white;
padding:20px;
}
.box{
max-width:700px;
margin:auto;
background:#10284f;
padding:20px;
border-radius:20px;
}
.card{
background:#173764;
padding:20px;
margin-top:20px;
border-radius:20px;
}
input,select{
width:100%;
padding:14px;
margin:8px 0;
border:none;
border-radius:10px;
font-size:18px;
}
button{
width:100%;
padding:14px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
font-size:18px;
margin-top:10px;
}
</style>
</head>

<body>

<script>
if(localStorage.getItem("login")!="yes"){
window.location.href="admin.html";
}
</script>

<div class="box">

<h1>Dr Duty Control Panel</h1>

<div class="card">
<h2>Hospital Name</h2>
<input placeholder="Hospital Name">
<button>Save</button>
</div>

<div class="card">
<h2>Add / Edit Doctor</h2>

<input placeholder="Doctor Name">

<select>
<option>Emergency Medicine</option>
<option>Surgery</option>
<option>Internal Medicine</option>
<option>Pediatrics</option>
<option>Orthopedics</option>
<option>ENT</option>
<option>Ophthalmology</option>
<option>Urology</option>
<option>Cardiology</option>
<option>Neurosurgery</option>
<option>Radiology</option>
<option>Dermatology</option>
<option>Gynecology</option>
<option>Anesthesia</option>
<option>Psychiatry</option>
<option>Oncology</option>
<option>Nephrology</option>
<option>Maxillofacial</option>
<option>Pediatric Surgery</option>
<option>Plastic Surgery</option>
<option>Cardiovascular Surgery</option>
<option>ICU</option>
<option>CCU</option>
<option>Medicine F Ward</option>
<option>Medicine M Ward</option>
<option>Surgery F Ward</option>
<option>Surgery M Ward</option>
<option>Dialysis Ward</option>
<option>Oncology Ward</option>
<option>Referral Doctor</option>
<option>Emergency Ward Rotating Resident</option>
<option>Evening Consultant</option>
<option>Emergency Ward Intern Doctor</option>
</select>

<input placeholder="Phone Number">

<button>Save Doctor</button>
</div>

<button onclick="logout()">Logout</button>

</div>

<script>
function logout(){
localStorage.removeItem("login");
window.location.href="admin.html";
}
</script>

</body>
</html>
