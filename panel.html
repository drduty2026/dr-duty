<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>panel.html</title>

<style>
body{margin:0;font-family:Arial;background:#081a35;color:#fff;padding:20px}
.box{max-width:900px;margin:auto;background:#10284f;padding:20px;border-radius:20px}
.card{background:#173764;padding:18px;border-radius:18px;margin-top:15px}
input,select,button{
width:100%;
padding:14px;
margin:8px 0;
border:none;
border-radius:10px;
font-size:17px;
box-sizing:border-box;
}
button{background:#2563eb;color:#fff;font-weight:bold}
.red{background:#dc2626}
.green{background:#16a34a}
.gray{background:#475569}
.orange{background:#ea580c}
</style>
</head>

<body>

<script>
if(localStorage.getItem("loggedIn")!="yes" || localStorage.getItem("role")!="admin"){
location.href="admin.html";
}
</script>

<div class="box">

<h1>Admin Panel</h1>

<div class="card">
<h2>Hospitals</h2>

<input id="hospitalInput" placeholder="Hospital Name">
<button onclick="addHospital()">Save Hospital</button>

<select id="hospitalList"></select>

<button class="red" onclick="deleteHospital()">Delete Hospital</button>
</div>

<div class="card">
<h2>Doctors</h2>

<input id="docName" placeholder="Doctor Name">
<input id="docPhone" placeholder="Phone Number">

<select id="docHospital"></select>

<button onclick="saveDoctor()">Save Doctor</button>

<select id="doctorList" onchange="loadDoctor()"></select>

<button class="red" onclick="deleteDoctor()">Delete Doctor</button>
</div>

<div class="card">
<h2>Assistants</h2>

<select id="assistantDoctor"></select>

<input id="assistantPass" placeholder="Password">

<button class="green" onclick="makeAssistant()">Make Assistant</button>

<select id="assistantList"></select>

<input id="newPass" placeholder="New Password">

<button class="orange" onclick="changePass()">Change Password</button>

<button class="gray" onclick="toggleAssistant()">Disable / Enable</button>

<button class="red" onclick="deleteAssistant()">Delete Assistant</button>
</div>

<button class="red" onclick="logout()">Logout</button>

</div>

<script>

function getData(k){
return JSON.parse(localStorage.getItem(k)||"[]");
}

function setData(k,v){
localStorage.setItem(k,JSON.stringify(v));
}

/* Hospitals */

function loadHospitals(){
let arr=getData("hospitals");

hospitalList.innerHTML="";
docHospital.innerHTML="";

arr.forEach(x=>{
hospitalList.innerHTML+=<option>${x}</option>;
docHospital.innerHTML+=<option>${x}</option>;
});
}

function addHospital(){
let v=hospitalInput.value.trim();
if(v=="") return;

let arr=getData("hospitals");
arr.push(v);

setData("hospitals",arr);

hospitalInput.value="";
loadHospitals();
}

function deleteHospital(){
let arr=getData("hospitals").filter(x=>x!=hospitalList.value);
setData("hospitals",arr);
loadHospitals();
}

/* Doctors */

function loadDoctors(){

let arr=getData("doctors");

doctorList.innerHTML="";
assistantDoctor.innerHTML="";

arr.forEach(x=>{
doctorList.innerHTML+=<option>${x.name}</option>;
assistantDoctor.innerHTML+=<option>${x.name}</option>;
});
}

function saveDoctor(){

let arr=getData("doctors");

let obj={
name:docName.value,
phone:docPhone.value,
hospital:docHospital.value
};

arr=arr.filter(x=>x.name!=obj.name);
arr.push(obj);

setData("doctors",arr);

loadDoctors();

alert("Saved");
}

function loadDoctor(){

let arr=getData("doctors");

let d=arr.find(x=>x.name==doctorList.value);

if(!d) return;

docName.value=d.name;
docPhone.value=d.phone;
docHospital.value=d.hospital;
}

function deleteDoctor(){

let arr=getData("doctors").filter(x=>x.name!=doctorList.value);

setData("doctors",arr);

loadDoctors();
}

/* Assistants */

function loadAssistants(){

let arr=getData("assistants");

assistantList.innerHTML="";

arr.forEach(x=>{
assistantList.innerHTML+=<option>${x.user}</option>;
});
}

function makeAssistant(){

let arr=getData("assistants");

let user=assistantDoctor.value;
let pass=assistantPass.value;

arr=arr.filter(x=>x.user!=user);

arr.push({
user:user,
pass:pass,
active:true
});

setData("assistants",arr);

assistantPass.value="";

loadAssistants();

alert("Assistant Created");
}

function changePass(){

let arr=getData("assistants");

arr.forEach(x=>{
if(x.user==assistantList.value){
x.pass=newPass.value;
}
});

setData("assistants",arr);

alert("Password Changed");
}

function toggleAssistant(){

let arr=getData("assistants");

arr.forEach(x=>{
if(x.user==assistantList.value){
x.active=!x.active;
}
});

setData("assistants",arr);

alert("Updated");
}

function deleteAssistant(){

let arr=getData("assistants").filter(x=>x.user!=assistantList.value);

setData("assistants",arr);

loadAssistants();

alert("Deleted");
}

/* Logout */

function logout(){

localStorage.removeItem("loggedIn");
localStorage.removeItem("role");

location.href="admin.html";
}

/* Start */

loadHospitals();
loadDoctors();
loadAssistants();

</script>

</body>
</html>
