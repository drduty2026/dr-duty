<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Assistant Panel</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1730;
color:white;
padding:20px;
}
.box{
max-width:850px;
margin:auto;
background:#10284f;
padding:20px;
border-radius:20px;
}
.card{
background:#173764;
padding:18px;
border-radius:18px;
margin-top:15px;
}
input,select,button{
width:100%;
padding:14px;
margin:8px 0;
border:none;
border-radius:10px;
font-size:17px;
box-sizing:border-box;
}
button{
background:#2563eb;
color:white;
font-weight:bold;
}
.red{
background:#dc2626;
}
</style>
</head>

<body>

<div class="box">

<h1>Assistant Panel</h1>

<div class="card">

<h2>Update Duty</h2>

<select id="spec"></select>

<input id="doctorName" placeholder="Doctor Name">

<input id="doctorPhone" placeholder="Phone Number">

<button onclick="saveDuty()">Save Duty</button>

</div>

<button class="red" onclick="logout()">Logout</button>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

if(localStorage.getItem("role")!=="assistant"){
location.href="admin.html";
}

const firebaseConfig = {
apiKey: "AIzaSyDQqQpACfdiq-i1q-hv9auGjEkSeHhMIuc",
authDomain: "dr-duty.firebaseapp.com",
projectId: "dr-duty",
storageBucket: "dr-duty.firebasestorage.app",
messagingSenderId: "1051471488231",
appId: "1:1051471488231:web:d9abfafee31373ec826e42"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const arr = [
"Emergency Medicine","Surgery","Internal Medicine","Pediatrics",
"Orthopedics","ENT","Ophthalmology","Urology","Cardiology",
"Neurosurgery","Radiology","Dermatology","Gynecology",
"Anesthesia","Psychiatry","Oncology","Nephrology",
"Maxillofacial","Pediatric Surgery","Plastic Surgery",
"Cardiovascular Surgery","ICU","CCU","Medicine F Ward",
"Medicine M Ward","Surgery F Ward","Surgery M Ward",
"Dialysis Ward","Oncology Ward","Referral Doctor",
"Emergency Ward Rotating Resident","Evening Consultant",
"Emergency Ward Intern Doctor"
];

for(let i=0;i<arr.length;i++){
spec.innerHTML += "<option>"+arr[i]+"</option>";
}

function saveDuty(){

db.collection("Duties").doc(spec.value).set({
spec:spec.value,
name:doctorName.value,
phone:doctorPhone.value
}).then(()=>{
alert("Saved");
});

}

function logout(){
localStorage.removeItem("role");
location.href="admin.html";
}

</script>

</body>
</html>
