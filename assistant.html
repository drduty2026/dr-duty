<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Assistant Panel</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1730;
color:white;
padding:20px;
}
.box{
max-width:850px;
margin:auto;
background:#10284f;
padding:20px;
border-radius:20px;
}
.card{
background:#173764;
padding:18px;
border-radius:18px;
margin-top:15px;
}
input,select,button{
width:100%;
padding:14px;
margin:8px 0;
border:none;
border-radius:10px;
font-size:17px;
box-sizing:border-box;
}
button{
background:#2563eb;
color:white;
font-weight:bold;
}
.red{
background:#dc2626;
}
</style>
</head>

<body>

<script>
if(localStorage.getItem("session")!=="assistant"){
location.href="admin.html";
}
</script>

<div class="box">

<h1>Assistant Panel</h1>

<div class="card">

<h2>Edit Duty</h2>

<select id="specList"></select>

<input id="doctorName" placeholder="Doctor Name">

<input id="doctorPhone" placeholder="Phone Number">

<button onclick="saveDuty()">Save Changes</button>

</div>

<button class="red" onclick="logout()">Logout</button>

</div>

<script>

function getData(k){
return JSON.parse(localStorage.getItem(k)||"[]");
}

function setData(k,v){
localStorage.setItem(k,JSON.stringify(v));
}

const specs=[
"Emergency Medicine","Surgery","Internal Medicine","Pediatrics",
"Orthopedics","ENT","Ophthalmology","Urology","Cardiology",
"Neurosurgery","Radiology","Dermatology","Gynecology",
"Anesthesia","Psychiatry","Oncology","Nephrology",
"Maxillofacial","Pediatric Surgery","Plastic Surgery",
"Cardiovascular Surgery","ICU","CCU","Medicine F Ward",
"Medicine M Ward","Surgery F Ward","Surgery M Ward",
"Dialysis Ward","Oncology Ward","Referral Doctor",
"Emergency Ward Rotating Resident","Evening Consultant",
"Emergency Ward Intern Doctor"
];

specs.forEach(x=>{
specList.innerHTML+=<option>${x}</option>;
});

function saveDuty(){

let arr=getData("duties");

arr=arr.filter(x=>x.spec!==specList.value);

arr.push({
spec:specList.value,
name:doctorName.value,
phone:doctorPhone.value
});

setData("duties",arr);

alert("Saved");
}

function logout(){
localStorage.removeItem("session");
location.href="admin.html";
}

</script>

</body>
</html>
