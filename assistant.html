<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Assistant Panel</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1730;
color:white;
padding:20px;
}
.box{
max-width:850px;
margin:auto;
background:#10284f;
padding:20px;
border-radius:20px;
}
.card{
background:#173764;
padding:18px;
border-radius:18px;
margin-top:15px;
}
input,select,button{
width:100%;
padding:14px;
margin:8px 0;
border:none;
border-radius:10px;
font-size:17px;
box-sizing:border-box;
}
button{
background:#2563eb;
color:white;
font-weight:bold;
}
.red{
background:#dc2626;
}
</style>
</head>

<body>

<script>
if(localStorage.getItem("loggedIn")!="yes" || localStorage.getItem("role")!="assistant"){
location.href="admin.html";
}
</script>

<div class="box">

<h1>Assistant Panel</h1>

<div class="card">

<h2>Edit Doctors</h2>

<select id="doctorList" onchange="loadDoctor()"></select>

<input id="docName" placeholder="Doctor Name">

<input id="docPhone" placeholder="Phone Number">

<select id="docHospital"></select>

<button onclick="saveDoctor()">Save Changes</button>

</div>

<button class="red" onclick="logout()">Logout</button>

</div>

<script>

function getData(k){
return JSON.parse(localStorage.getItem(k)||"[]");
}

function setData(k,v){
localStorage.setItem(k,JSON.stringify(v));
}

/* Hospitals */
function loadHospitals(){

let arr=getData("hospitals");

docHospital.innerHTML="";

arr.forEach(x=>{
docHospital.innerHTML+=<option>${x}</option>;
});

}

/* Doctors */
function loadDoctors(){

let arr=getData("doctors");

doctorList.innerHTML="";

arr.forEach(x=>{
doctorList.innerHTML+=<option>${x.name}</option>;
});

}

function loadDoctor(){

let arr=getData("doctors");

let d=arr.find(x=>x.name==doctorList.value);

if(!d) return;

docName.value=d.name;
docPhone.value=d.phone;
docHospital.value=d.hospital;

}

function saveDoctor(){

let arr=getData("doctors");

let obj={
name:docName.value,
phone:docPhone.value,
hospital:docHospital.value
};

arr=arr.filter(x=>x.name!=doctorList.value);
arr.push(obj);

setData("doctors",arr);

loadDoctors();

alert("Saved");

}

/* Logout */
function logout(){

localStorage.removeItem("loggedIn");
localStorage.removeItem("role");
localStorage.removeItem("assistantName");

location.href="admin.html";

}

/* Start */
loadHospitals();
loadDoctors();

</script>

</body>
</html>
