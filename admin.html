<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dr Duty Login</title>

<style>
body{
margin:0;
font-family:Arial;
background:#081a35;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}
.box{
width:90%;
max-width:420px;
background:#10284f;
padding:30px;
border-radius:20px;
}
input,button{
width:100%;
padding:14px;
margin:8px 0;
border:none;
border-radius:10px;
font-size:17px;
box-sizing:border-box;
}
button{
background:#2563eb;
color:white;
font-weight:bold;
}
</style>
</head>

<body>

<div class="box">
<h1>Dr Duty Login</h1>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyDQqQpACfdiq-i1q-hv9auGjEkSeHhMIuc",
authDomain: "dr-duty.firebaseapp.com",
projectId: "dr-duty",
storageBucket: "dr-duty.firebasestorage.app",
messagingSenderId: "1051471488231",
appId: "1:1051471488231:web:d9abfafee31373ec826e42"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function login(){

let u=user.value.trim();
let p=pass.value.trim();

if(u==="admin" && p==="1234"){
localStorage.setItem("role","admin");
location.href="panel.html";
return;
}

db.collection("Assistants").doc(u).get().then(doc=>{

if(doc.exists){

let d=doc.data();

if(d.password===p && d.active===true){
localStorage.setItem("role","assistant");
location.href="assistant.html";
return;
}
}

alert("Wrong Login");

});

}

</script>

</body>
</html>
