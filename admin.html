<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>admin.html</title>
<style>
body{margin:0;font-family:Arial;background:#081226;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh}
.box{background:#10284f;padding:30px;border-radius:20px;width:90%;max-width:420px}
input,button{width:100%;padding:14px;margin:8px 0;border:none;border-radius:10px;font-size:18px}
button{background:#2563eb;color:#fff}
</style>
</head>
<body>
<div class="box">
<h1>Dr Duty Login</h1>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<script>
function login(){
let u=user.value.trim();
let p=pass.value.trim();

if(u=="admin" && p=="1234"){
localStorage.setItem("role","admin");
location.href="panel.html";
return;
}

let arr=JSON.parse(localStorage.getItem("assistants")||"[]");

for(let i=0;i<arr.length;i++){
if(arr[i].user==u && arr[i].pass==p){
localStorage.setItem("role","assistant");
location.href="assistant.html";
return;
}
}

alert("Wrong Login");
}
</script>
</body>
</html>
