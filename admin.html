<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dr Duty Admin</title>

<style>
body{
margin:0;
padding:20px;
font-family:Arial;
background:#081226;
color:white;
}
.box{
max-width:900px;
margin:auto;
background:#10203a;
padding:25px;
border-radius:20px;
}
h1,h2,h3{
text-align:center;
}
input,select{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:10px;
font-size:16px;
}
button{
width:100%;
padding:12px;
margin-top:8px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}
.card{
background:#17304f;
padding:15px;
border-radius:15px;
margin-top:15px;
}
.hide{
display:none;
}
</style>
</head>
<body>

<div class="box">

<h1>Dr Duty Control Panel</h1>

<div id="loginBox">

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<div id="panel" class="hide">

<h2 id="welcome"></h2>

<div class="card">

<h3>Add Hospital</h3>

<select id="hospitalName"></select>

<input id="newHospital" placeholder="New Hospital Name">

<button onclick="addHospital()">Add Hospital</button>

</div>

<div class="card">

<h3>Add / Edit Doctor</h3>

<select id="doctorList" onchange="loadDoctor()"></select>

<input id="docName" placeholder="Doctor Name">

<input id="docPhone" placeholder="Phone Number">

<select id="docSpec"></select>

<select id="doctorHospital"></select>

<button onclick="saveDoctor()">Save Doctor</button>

</div>

<div class="card" id="usersBox">

<h3>Main Admin Only</h3>

<input id="newUser" placeholder="Username">

<input id="newPass" placeholder="Password">

<select id="newRole">
<option value="editor">Editor</option>
<option value="admin">Admin</option>
</select>

<button onclick="saveUser()">Create User</button>

</div>

<button onclick="logout()">Logout</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
doc,
setDoc,
getDoc,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyDQqQpACfdiq-i1q-hv9auGjEkSeHhMIuc",
authDomain:"dr-duty.firebaseapp.com",
projectId:"dr-duty",
storageBucket:"dr-duty.firebasestorage.app",
messagingSenderId:"1051471488231",
appId:"1:1051471488231:web:d9abfafee31373ec826e42"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const specs = [
"Emergency Medicine","Surgery","Internal Medicine","Pediatrics",
"Orthopedics","ENT","Ophthalmology","Urology","Cardiology",
"Neurosurgery","Radiology","Dermatology","Gynecology","Anesthesia",
"Psychiatry","Oncology","Nephrology","Maxillfacial",
"Pediatric Surgery","Plastic Surgery","Cardiovascular Surgery",
"ICU","CCU","Medicine F Ward","Medicine M Ward",
"Surgery F Ward","Surgery M Ward","Dialysis Ward",
"Oncology Ward","Referral Doctor",
"Emergency Ward Rotating Resident",
"Evening Consultant",
"Emergency Ward Intern Doctor"
];

specs.forEach(x=>{
docSpec.innerHTML += <option>${x}</option>;
});

window.login = async function(){

let ref = await getDoc(doc(db,"users",user.value));

if(!ref.exists()){
alert("Wrong user");
return;
}

let data = ref.data();

if(data.password != pass.value){
alert("Wrong password");
return;
}

localStorage.setItem("user",user.value);
localStorage.setItem("role",data.role);

startPanel();

}

window.startPanel = async function(){

loginBox.classList.add("hide");
panel.classList.remove("hide");

welcome.innerHTML =
"Welcome " + localStorage.getItem("user");

if(localStorage.getItem("role")!="admin"){
usersBox.classList.add("hide");
}

loadHospitals();
loadDoctors();

}

window.addHospital = async function(){

if(newHospital.value=="") return;

await setDoc(doc(db,"hospitals",newHospital.value),{
name:newHospital.value
});

newHospital.value="";

loadHospitals();

}

async function loadHospitals(){

hospitalName.innerHTML="";
doctorHospital.innerHTML="";

const query = await getDocs(collection(db,"hospitals"));

query.forEach(d=>{

hospitalName.innerHTML +=
<option>${d.id}</option>;

doctorHospital.innerHTML +=
<option>${d.id}</option>;

});

}

window.saveDoctor = async function(){

await setDoc(doc(db,"doctors",docName.value),{
name:docName.value,
phone:docPhone.value,
specialty:docSpec.value,
hospital:doctorHospital.value
});

loadDoctors();

alert("Saved");

}

async function loadDoctors(){

doctorList.innerHTML="<option>Select Doctor</option>";

const query = await getDocs(collection(db,"doctors"));

query.forEach(d=>{

doctorList.innerHTML +=
<option>${d.id}</option>;

});

}

window.loadDoctor = async function(){

let ref = await getDoc(doc(db,"doctors",doctorList.value));

if(!ref.exists()) return;

let d = ref.data();

docName.value = d.name;
docPhone.value = d.phone;
docSpec.value = d.specialty;
doctorHospital.value = d.hospital;

}

window.saveUser = async function(){

if(localStorage.getItem("role")!="admin"){
alert("Denied");
return;
}

await setDoc(doc(db,"users",newUser.value),{
password:newPass.value,
role:newRole.value
});

alert("User Created");

}

window.logout = function(){

localStorage.clear();
location.reload();

}

if(localStorage.getItem("user")){
startPanel();
}

</script>
</body>
</html>
