<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dr Duty Admin</title>

<style>
body{
margin:0;
font-family:Arial;
background:#081226;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}
.box{
width:90%;
max-width:420px;
background:#10203a;
padding:25px;
border-radius:20px;
text-align:center;
}
input{
width:100%;
padding:14px;
margin:8px 0;
border:none;
border-radius:10px;
font-size:16px;
}
button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-size:18px;
font-weight:bold;
}
</style>
</head>
<body>

<div class="box">
<h1>Dr Duty Admin</h1>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>
</div>

<script>
function login(){

let u=document.getElementById("user").value.trim();
let p=document.getElementById("pass").value.trim();

if(u==="admin" && p==="1234"){
alert("Login Success");
}else{
alert("Wrong login");
}

}
</script>

</body>
</html>
