<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dr Duty Admin</title>

<style>
body{
margin:0;
font-family:Arial;
background:#081226;
color:white;
padding:20px;
}
.box{
max-width:900px;
margin:auto;
background:#10203a;
padding:25px;
border-radius:20px;
box-shadow:0 0 25px rgba(0,0,0,.35);
}
h1{
margin-top:0;
text-align:center;
}
input,select{
width:100%;
padding:12px;
margin:7px 0;
border:none;
border-radius:10px;
font-size:16px;
}
button{
background:#2563eb;
color:white;
border:none;
padding:12px 18px;
border-radius:10px;
font-size:16px;
cursor:pointer;
margin-top:10px;
}
button:hover{opacity:.9}
.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}
.card{
background:#17304f;
padding:15px;
border-radius:15px;
margin-top:12px;
}
.hide{display:none}
small{color:#aaa}
</style>
</head>
<body>

<div class="box">

<h1>Dr Duty Control Panel</h1>

<div id="loginBox">
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="panel" class="hide">

<h2 id="welcome"></h2>

<div class="card">
<h3>Hospital Name</h3>
<input id="hospitalName">
<button onclick="saveHospital()">Save</button>
</div>

<div class="card">
<h3>Add / Edit Doctor</h3>

<input id="docName" placeholder="Doctor Name">
<input id="docSpec" placeholder="Specialty">
<input id="docPhone" placeholder="Phone Number">

<button onclick="saveDoctor()">Save Doctor</button>
</div>

<div class="card" id="usersBox">
<h3>Main Admin Only - Users</h3>

<input id="newUser" placeholder="Username">
<input id="newPass" placeholder="Password">
<select id="newRole">
<option value="editor">Editor</option>
<option value="admin">Admin</option>
</select>

<button onclick="saveUser()">Create User</button>
</div>

<button onclick="logout()">Logout</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
doc,
setDoc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDQqQpACfdiq-i1q-hv9auGjEkSeHhMIuc",
authDomain: "dr-duty.firebaseapp.com",
projectId: "dr-duty",
storageBucket: "dr-duty.firebasestorage.app",
messagingSenderId: "1051471488231",
appId: "1:1051471488231:web:d9abfafee31373ec826e42"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.login = async function(){

let u = user.value.trim();
let p = pass.value.trim();

let ref = await getDoc(doc(db,"users",u));

if(!ref.exists()){
alert("Wrong user");
return;
}

let data = ref.data();

if(data.password != p){
alert("Wrong password");
return;
}

localStorage.setItem("user",u);
localStorage.setItem("role",data.role);

startPanel();
}

window.startPanel = async function(){

loginBox.classList.add("hide");
panel.classList.remove("hide");

let role = localStorage.getItem("role");
let userx = localStorage.getItem("user");

welcome.innerHTML = "Welcome: " + userx + " ("+role+")";

if(role!="admin"){
usersBox.classList.add("hide");
}

let h = await getDoc(doc(db,"settings","hospital"));
if(h.exists()){
hospitalName.value = h.data().name;
}

}

window.saveHospital = async function(){
await setDoc(doc(db,"settings","hospital"),{
name:hospitalName.value
});
alert("Saved");
}

window.saveDoctor = async function(){

await setDoc(doc(db,"doctors",docName.value),{
name:docName.value,
specialty:docSpec.value,
phone:docPhone.value,
hospital:hospitalName.value
});

alert("Doctor Saved");
}

window.saveUser = async function(){

if(localStorage.getItem("role")!="admin"){
alert("Denied");
return;
}

await setDoc(doc(db,"users",newUser.value),{
password:newPass.value,
role:newRole.value
});

alert("User Created");
}

window.logout = function(){
localStorage.clear();
location.reload();
}

if(localStorage.getItem("user")){
startPanel();
}

</script>
</body>
</html>
