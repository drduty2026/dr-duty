<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Login</title>

<style>
body{
margin:0;
font-family:Arial;
background:#081226;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}
.box{
background:#10284f;
padding:30px;
border-radius:20px;
width:90%;
max-width:400px;
}
input{
width:100%;
padding:14px;
margin:8px 0;
border:none;
border-radius:10px;
font-size:18px;
}
button{
width:100%;
padding:14px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
font-size:20px;
}
</style>
</head>

<body>

<div class="box">
<h1>Dr Duty Login</h1>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>
</div>

<script>
function login(){

var u = document.getElementById("user").value;
var p = document.getElementById("pass").value;

if(u=="admin" && p=="1234"){
window.location.href="panel.html";
}else{
alert("Wrong Login");
}

}
</script>

</body>
</html>
