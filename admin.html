<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dr Duty Login</title>

<style>
body{
margin:0;
font-family:Arial;
background:#081a44;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}
.box{
width:90%;
max-width:420px;
background:#102b63;
padding:30px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,.3);
}
h1{text-align:center;margin-bottom:25px;}
input{
width:100%;
padding:14px;
margin:8px 0;
border:none;
border-radius:10px;
font-size:17px;
box-sizing:border-box;
}
button{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:10px;
background:#1f6bff;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box">

<h1>Dr Duty Login</h1>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script>

/* Auto login if already signed in */
if(localStorage.getItem("loggedIn")=="yes"){

if(localStorage.getItem("role")=="admin"){
location.href="panel.html";
}else{
location.href="assistant.html";
}

}

function login(){

let u=document.getElementById("user").value.trim();
let p=document.getElementById("pass").value.trim();

/* Admin Login */
if(u=="admin" && p=="1234"){

localStorage.setItem("loggedIn","yes");
localStorage.setItem("role","admin");

location.href="panel.html";
return;
}

/* Assistant Login */
let arr=JSON.parse(localStorage.getItem("assistants")||"[]");

let found=arr.find(x=>
x.user==u &&
x.pass==p &&
x.active==true
);

if(found){

localStorage.setItem("loggedIn","yes");
localStorage.setItem("role","assistant");
localStorage.setItem("assistantName",u);

location.href="assistant.html";
return;
}

alert("Wrong Login");

}
</script>

</body>
</html>
