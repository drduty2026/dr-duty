<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dr Duty Login</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#081a35;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}
.box{
width:90%;
max-width:420px;
background:#10284f;
padding:30px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,.3);
}
h1{
text-align:center;
margin-bottom:20px;
}
input{
width:100%;
padding:14px;
margin:8px 0;
border:none;
border-radius:10px;
font-size:17px;
box-sizing:border-box;
}
button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box">

<h1>Dr Duty Login</h1>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
doc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDQqQpACfdiq-i1q-hv9auGjEkSeHhMIuc",
authDomain: "dr-duty.firebaseapp.com",
projectId: "dr-duty",
storageBucket: "dr-duty.firebasestorage.app",
messagingSenderId: "1051471488231",
appId: "1:1051471488231:web:d9abfafee31373ec826e42"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.login = async function(){

let u=document.getElementById("user").value.trim();
let p=document.getElementById("pass").value.trim();

/* MAIN ADMIN */
if(u==="admin" && p==="1234"){
localStorage.setItem("role","admin");
location.href="panel.html";
return;
}

/* Assistants */
const ref = doc(db,"Assistants",u);
const snap = await getDoc(ref);

if(snap.exists()){

let data=snap.data();

if(data.password===p && data.active===true){

localStorage.setItem("role","assistant");
localStorage.setItem("assistant",u);

location.href="assistant.html";
return;
}
}

alert("Wrong Username or Password");

}

</script>

</body>
</html>
