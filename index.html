<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dr Duty Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url('https://images.unsplash.com/photo-1576091160550-2173dba999ef?auto=format&fit=crop&w=1200&q=80') center/cover no-repeat;
overflow:hidden;
}

body::before{
content:'';
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
backdrop-filter:blur(6px);
}

.card{
position:relative;
z-index:2;
width:92%;
max-width:720px;
padding:38px;
border-radius:34px;
background:rgba(255,255,255,.10);
border:1px solid rgba(255,255,255,.20);
box-shadow:0 0 35px rgba(0,255,255,.18);
text-align:center;
color:#fff;
}

h1{
font-size:76px;
font-weight:800;
margin-bottom:10px;
text-shadow:0 0 20px rgba(255,255,255,.25);
}

.sub{
font-size:24px;
opacity:.95;
margin-bottom:34px;
}

input{
width:100%;
padding:24px;
font-size:38px;
border:none;
outline:none;
border-radius:22px;
text-align:center;
margin-bottom:24px;
}

button{
width:100%;
padding:24px;
font-size:44px;
font-weight:bold;
border:none;
border-radius:24px;
cursor:pointer;
color:#fff;
background:linear-gradient(90deg,#2196f3,#00e5ff);
box-shadow:0 15px 35px rgba(0,255,255,.25);
}

.note{
margin-top:22px;
font-size:20px;
opacity:.9;
}

.error{
animation:shake .3s;
}

@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-8px)}
50%{transform:translateX(8px)}
75%{transform:translateX(-8px)}
100%{transform:translateX(0)}
}

@media(max-width:700px){
h1{font-size:62px;}
.sub{font-size:18px;}
input{font-size:28px;padding:20px;}
button{font-size:34px;padding:20px;}
}
</style>
</head>

<body>

<div class="card">

<h1>Dr_Duty</h1>

<div class="sub">Medical On-Call Portal</div>

<input type="password" id="pass" placeholder="كلمة المرور">

<button onclick="login()" id="btn">دخول</button>

<div class="note">Authorized Doctors Only</div>

</div>

<script>

function login(){

const password="54321";
const val=document.getElementById("pass").value.trim();
const btn=document.getElementById("btn");

if(val===password){

const params=new URLSearchParams(window.location.search);
const spec=params.get("spec") || "Emergency Medicine";

window.location.href=
"portal.html?spec="+encodeURIComponent(spec);

}else{

btn.classList.remove("error");
void btn.offsetWidth;
btn.classList.add("error");

document.getElementById("pass").value="";
document.getElementById("pass").placeholder="كلمة المرور خطأ";

}

}

document.getElementById("pass").addEventListener("keypress",function(e){
if(e.key==="Enter") login();
});

</script>

</body>
</html>
