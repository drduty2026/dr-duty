<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr_Duty</title>

<style>
body{
margin:0;
font-family:Arial;
background:#07131f;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.box{
background:#0d1f33;
padding:40px;
border-radius:25px;
width:320px;
text-align:center;
box-shadow:0 0 30px #00bfff;
}

h1{
margin-bottom:30px;
font-size:42px;
}

input{
width:100%;
padding:18px;
border:none;
border-radius:15px;
font-size:22px;
text-align:center;
margin-bottom:20px;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:15px;
background:#00ff88;
font-size:26px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#00cc66;
}
</style>
</head>

<body>

<div class="box">
<h1>Dr_Duty</h1>

<input type="password" id="pass" placeholder="كلمة المرور">

<button onclick="login()">دخول</button>
</div>

<script>
function login(){
let p=document.getElementById("pass").value;

if(p=="11223344"){
window.location.href="portal.html";
}else{
alert("كلمة المرور خطأ");
}
}
</script>

</body>
</html>
