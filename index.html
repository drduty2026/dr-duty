<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dr Duty Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url('https://images.unsplash.com/photo-1576091160550-2173dba999ef?auto=format&fit=crop&w=1200&q=80') center/cover no-repeat;
overflow:hidden;
}

body::before{
content:'';
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
backdrop-filter:blur(6px);
}

.card{
position:relative;
z-index:2;
width:92%;
max-width:720px;
padding:38px;
border-radius:34px;
background:rgba(255,255,255,.10);
border:1px solid rgba(255,255,255,.20);
box-shadow:0 0 35px rgba(0,255,255,.18);
text-align:center;
color:#fff;
}

h1{
font-size:60px;
font-weight:800;
margin-bottom:10px;
}

.sub{
font-size:20px;
margin-bottom:20px;
}

input,select{
width:100%;
padding:18px;
font-size:20px;
border:none;
border-radius:15px;
text-align:center;
margin-bottom:15px;
}

button{
width:100%;
padding:20px;
font-size:26px;
font-weight:bold;
border:none;
border-radius:20px;
cursor:pointer;
color:#fff;
background:linear-gradient(90deg,#2196f3,#00e5ff);
}

</style>
</head>

<body>

<div class="card">

<h1>Dr_Duty</h1>

<div class="sub">Medical On-Call Portal</div>

<input type="password" id="pass" placeholder="كلمة المرور">

<select id="hospitalSelect">
<option disabled selected>اختر المستشفى</option>
</select>

<button onclick="login()">دخول</button>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyDQqQpACfdiq-i1q-hv9auGjEkSeHhMIuc",
authDomain: "dr-duty.firebaseapp.com",
projectId: "dr-duty"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* تحميل المستشفيات */
function loadHospitals(){

hospitalSelect.innerHTML =
'<option disabled selected>اختر المستشفى</option>';

db.collection("Hospitals").get().then(snap=>{
snap.forEach(doc=>{
hospitalSelect.innerHTML +=
<option value="${doc.id}">${doc.id}</option>;
});
});

}

loadHospitals();

/* تسجيل الدخول */
function login(){

const password="54321dr"; // أكثر أمان
const val=document.getElementById("pass").value.trim();

if(val!==password){
alert("كلمة المرور خطأ");
return;
}

let hospital = hospitalSelect.value;

if(!hospital){
alert("اختار مستشفى");
return;
}

const params=new URLSearchParams(window.location.search);
const spec=params.get("spec") || "Emergency Medicine";

/* إرسال البيانات للصفحة التالية */
window.location.href =
"portal.html?spec="+encodeURIComponent(spec)+"&hospital="+encodeURIComponent(hospital);

}

</script>

</body>
</html>
