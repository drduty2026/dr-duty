<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DR DUTY</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial;
    background:url('https://images.unsplash.com/photo-1584982751601-97dcc096659c?q=80&w=1200&auto=format&fit=crop') no-repeat center center fixed;
    background-size:cover;
}

.overlay{
    width:100%;
    min-height:100vh;
    background:rgba(0,0,0,0.65);
    display:flex;
    justify-content:center;
    align-items:center;
}

.box{
    width:340px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    border-radius:25px;
    padding:30px;
    text-align:center;
    color:white;
    box-shadow:0 0 25px rgba(0,0,0,0.5);
}

h1{
    margin:0;
    font-size:40px;
}

.subtitle{
    color:#cccccc;
    margin-bottom:25px;
}

input,select{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    margin-top:15px;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    margin-top:20px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

.loginBtn{
    background:linear-gradient(to right,#1e90ff,#00d2ff);
    color:white;
}

.callBtn{
    background:linear-gradient(to right,#1e90ff,#00d2ff);
    color:white;
}

.whatsappBtn{
    background:#25D366;
    color:white;
}

#hospitalBox{
    display:none;
}

#doctorBox{
    display:none;
}

.doctorName{
    font-size:38px;
    font-weight:bold;
}

.spec{
    color:#00d2ff;
    font-size:26px;
    margin-top:10px;
}

.phone{
    margin-top:10px;
    font-size:22px;
}

.hospital{
    margin-top:10px;
    color:#dddddd;
    font-size:18px;
}

</style>

</head>

<body>

<div class="overlay">

<div class="box" id="loginBox">

<h1>Dr Duty</h1>

<div class="subtitle">
Medical On-Call Portal
</div>

<input
type="password"
id="password"
placeholder="Password"
/>

<button
class="loginBtn"
onclick="login()"
>
Login
</button>

</div>

<div class="box" id="hospitalBox">

<h1>Select</h1>

<div class="subtitle">
Choose Hospital
</div>

<select id="hospital">

<option>
Al-Mawani General Hospital
</option>

<option>
Basra Teaching Hospital
</option>

<option>
Al-Faihaa Hospital
</option>

<option>
Al-Sadr Teaching Hospital
</option>

<option>
Ibn Ghazwan Hospital
</option>

<option>
Al-Shifa Hospital
</option>

<option>
Basra Children Hospital
</option>

</select>

<button
class="loginBtn"
onclick="loadDoctor()"
>
Continue
</button>

</div>

<div class="box" id="doctorBox">

<div
class="doctorName"
id="doctorName"
></div>

<div
class="spec"
id="doctorSpecialty"
></div>

<div
class="phone"
id="doctorPhone"
></div>

<div
class="hospital"
id="doctorHospital"
></div>

<button
class="callBtn"
id="callBtn"
>
📞 Call
</button>

<button
class="whatsappBtn"
id="whatsappBtn"
>
💬 WhatsApp
</button>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {

apiKey: "AIzaSyDQqQpACfdiq-i1q-hv9auGjEkSeHhMIuc",

authDomain: "dr-duty.firebaseapp.com",

projectId: "dr-duty",

storageBucket: "dr-duty.appspot.com",

messagingSenderId: "1051471488231",

appId: "1:1051471488231:web:d9abfafee31373ec826e42"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

function login(){

const pass =
document.getElementById("password").value;

if(pass === "1234"){

document.getElementById("loginBox")
.style.display = "none";

document.getElementById("hospitalBox")
.style.display = "block";

}else{

alert("Wrong Password");

}

}

async function loadDoctor(){

const hospital =
document.getElementById("hospital")
.value;

const params =
new URLSearchParams(window.location.search);

const specialty =
params.get("spec");

const querySnapshot =
await db.collection("duty_doctors").get();

let found = false;

querySnapshot.forEach((doc)=>{

const data = doc.data();

const dbSpec =
data.specialty
.toLowerCase()
.trim();

const qrSpec =
specialty
.toLowerCase()
.trim();

const dbHospital =
data.hospital
.toLowerCase()
.trim();

const selectedHospital =
hospital
.toLowerCase()
.trim();

if(

dbSpec.includes(qrSpec) &&

dbHospital.includes(selectedHospital)

){

found = true;

document.getElementById("hospitalBox")
.style.display = "none";

document.getElementById("doctorBox")
.style.display = "block";

document.getElementById("doctorName")
.innerText =
data.doctorName;

document.getElementById("doctorSpecialty")
.innerText =
data.specialty;

document.getElementById("doctorPhone")
.innerText =
data.phone;

document.getElementById("doctorHospital")
.innerText =
data.hospital;

document.getElementById("callBtn")
.onclick = function(){

window.location.href =
`tel:${data.phone}`;

};

document.getElementById("whatsappBtn")
.onclick = function(){

window.location.href =
`https://wa.me/${data.phone}`;

};

}

});

if(!found){

alert("No Doctor Found");

}

}

</script>

</body>

</html>
