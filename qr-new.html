<!DOCTYPE html>
<html>

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>DR DUTY</title>

  <script type="module">

    import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getFirestore,
      collection,
      getDocs
    }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
  apiKey: "AIzaSyDQqQpACfdiq-i1q-hv9auGjEkSeHhMIuc",
  authDomain: "dr-duty.firebaseapp.com",
  projectId: "dr-duty",
  storageBucket: "dr-duty.firebasestorage.app",
  messagingSenderId: "1051471488231",
  appId: "1:1051471488231:web:d9abfafee31373ec826e42",
  measurementId: "G-RLD81M7950"
};

    const app = initializeApp(firebaseConfig);

    const db = getFirestore(app);

    const params =
      new URLSearchParams(window.location.search);

    const specialty =
      params.get("spec");

    window.checkPassword = async function () {

      const password =
        document.getElementById("password").value;

      if (password !== "1234") {

        alert("Wrong Password");

        return;
      }

      document.getElementById("loginBox")
          .style.display = "none";

      document.getElementById("hospitalBox")
          .style.display = "block";
    }

    window.loadDoctor = async function () {

      const hospital =
        document.getElementById("hospital").value;

      const querySnapshot =
        await getDocs(collection(db, "duty_doctors"));

      let found = false;

      querySnapshot.forEach((doc) => {

        const data = doc.data();

       const dbSpec =
  data.specialty
      .toLowerCase()
      .trim();

const qrSpec =
  specialty
      .toLowerCase()
      .trim();

const dbHospital =
  data.hospital
      .toLowerCase()
      .trim();

const selectedHospital =
  hospital
      .toLowerCase()
      .trim();

if (

  dbSpec.includes(qrSpec) &&

  dbHospital.includes(
    selectedHospital
  )

)

          found = true;

          document.getElementById("doctorBox")
              .style.display = "block";

          document.getElementById("doctorName")
              .innerText = data.doctorName;

          document.getElementById("doctorSpecialty")
              .innerText = data.specialty;

          document.getElementById("doctorHospital")
              .innerText = data.hospital;

          document.getElementById("doctorPhone")
              .innerText = data.phone;

          document.getElementById("callBtn")
              .href = "tel:" + data.phone;

          document.getElementById("waBtn")
              .href =
              "https://wa.me/964" +
              data.phone.substring(1);
        }

      });

      if (!found) {

        alert("No Doctor Found");
      }
    }

  </script>

  <style>

    body {

      margin: 0;

      background:
      url('hospital.jpg');

      background-size: cover;

      font-family: Arial;

      color: white;

      height: 100vh;

      display: flex;

      justify-content: center;

      align-items: center;
    }

    .box {

      width: 320px;

      padding: 25px;

      border-radius: 25px;

      background: rgba(0,0,0,0.45);

      backdrop-filter: blur(10px);

      text-align: center;
    }

    input,
    select {

      width: 100%;

      padding: 14px;

      border-radius: 12px;

      border: none;

      margin-top: 15px;
    }

    button,
    a {

      display: block;

      width: 100%;

      margin-top: 15px;

      padding: 14px;

      border-radius: 12px;

      text-decoration: none;

      border: none;

      color: white;

      font-weight: bold;
    }

    .loginBtn {

      background: #00c6ff;
    }

    .callBtn {

      background: #2196f3;
    }

    .waBtn {

      background: #00e676;
    }

  </style>

</head>

<body>

  <div class="box">

    <div id="loginBox">

      <h1>DR DUTY</h1>

      <input
        type="password"
        id="password"
        placeholder="Password">

      <button
        class="loginBtn"
        onclick="checkPassword()">

        LOGIN

      </button>

    </div>

    <div
      id="hospitalBox"
      style="display:none;">

      <h2>Select Hospital</h2>

      <select id="hospital">

        <option>
          Al-Mawani General Hospital
        </option>

        <option>
          Basra Teaching Hospital
        </option>

        <option>
          Al-Faihaa Hospital
        </option>

      </select>

      <button
        class="loginBtn"
        onclick="loadDoctor()">

        Continue

      </button>

    </div>

    <div
      id="doctorBox"
      style="display:none;">

      <h1 id="doctorName"></h1>

      <h2 id="doctorSpecialty"></h2>

      <p id="doctorPhone"></p>

      <p id="doctorHospital"></p>

      <a
        id="callBtn"
        class="callBtn">

        Call

      </a>

      <a
        id="waBtn"
        class="waBtn">

        WhatsApp

      </a>

    </div>

  </div>

</body>
</html>
