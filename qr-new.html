<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dr Duty QR Codes</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
margin:0;
padding:25px;
font-family:Arial,sans-serif;
background:#081225;
color:#fff;
text-align:center;
}
h1{font-size:48px;margin:10px 0;}
p{color:#bbb;font-size:22px;margin-bottom:30px;}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}
.card{
background:#fff;
color:#000;
padding:18px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,.25);
}
.name{
font-size:22px;
font-weight:700;
margin-bottom:15px;
}
.qr{
display:flex;
justify-content:center;
margin-bottom:12px;
}
.url{
font-size:11px;
word-break:break-all;
color:#666;
}
</style>
</head>

<body>

<h1>Dr Duty QR Codes</h1>
<p>33 Updated Departments</p>

<div class="grid" id="grid"></div>

<script>
const departments = [
"Emergency Medicine","Surgery","Internal Medicine","Pediatrics","Cardiology",
"Orthopedic","Neurology","ENT","Ophthalmology","Dermatology","Radiology",
"Anesthesia","ICU","Urology","Nephrology","Oncology","Psychiatry","Dental",
"Family Medicine","Pulmonary","Gastroenterology","Endocrinology",
"Rheumatology","Hematology","Infectious Disease","Plastic Surgery",
"Neurosurgery","Vascular Surgery","Thoracic Surgery","Gynecology",
"Obstetrics","Pathology","Laboratory"
];

const base = "https://drduty2026.github.io/dr-duty/index.html?spec=";
const grid = document.getElementById("grid");

departments.forEach(function(dep,i){

const url = base + encodeURIComponent(dep);
const id = "qr"+i;

const card = document.createElement("div");
card.className="card";

card.innerHTML =
'<div class="name">'+dep+'</div>'+
'<div class="qr" id="'+id+'"></div>'+
'<div class="url">'+url+'</div>';

grid.appendChild(card);

new QRCode(document.getElementById(id),{
text:url,
width:180,
height:180
});

});
</script>

</body>
</html>
