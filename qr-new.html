<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dr Duty QR Codes</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
margin:0;
padding:30px;
font-family:Arial;
background:#081226;
color:#fff;
text-align:center;
}
h1{font-size:56px;margin-bottom:10px;}
p{font-size:22px;color:#aaa;margin-bottom:30px;}
.topbtn{
background:#2563eb;
color:white;
border:none;
padding:15px 28px;
font-size:22px;
border-radius:18px;
font-weight:bold;
margin-bottom:30px;
}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:22px;
}
.card{
background:#fff;
color:#000;
padding:18px;
border-radius:18px;
}
.name{
font-size:22px;
font-weight:bold;
margin-bottom:12px;
}
.qr{
display:flex;
justify-content:center;
margin-bottom:10px;
}
.dbtn{
background:#16a34a;
color:#fff;
border:none;
padding:10px 18px;
border-radius:12px;
font-size:16px;
font-weight:bold;
margin-top:10px;
}
@media print{
.topbtn,.dbtn{display:none;}
body{background:#fff;color:#000;}
p{color:#000;}
}
</style>
</head>
<body>

<h1>Dr Duty QR Codes</h1>
<p>33 Updated Departments</p>

<button class="topbtn" onclick="window.print()">Download All PDF</button>

<div class="grid" id="grid"></div>

<script>
const departments = [
"Emergency Medicine","Surgery","Internal Medicine","Pediatrics","Cardiology",
"Orthopedic","Neurology","ENT","Ophthalmology","Dermatology",
"Radiology","Urology","Nephrology","Oncology","Psychiatry",
"Dental","Family Medicine","Pulmonary","Gastroenterology","Endocrinology",
"Rheumatology","Hematology","Infectious Disease","Plastic Surgery","Neurosurgery",
"Vascular Surgery","Thoracic Surgery","Gynecology","Obstetrics","Pathology",
"Laboratory","ICU","Anesthesia"
];

const base="https://drduty2026.github.io/dr-duty/portal.html?spec=";
const grid=document.getElementById("grid");

departments.forEach(dep=>{
let id=dep.replace(/\s/g,'');
let url=base+encodeURIComponent(dep);

let card=document.createElement("div");
card.className="card";

card.innerHTML=
<div class="name">${dep}</div>
<div class="qr" id="qr${id}"></div>
<button class="dbtn" onclick="downloadQR('qr${id}','${dep}')">Download PNG</button>
;

grid.appendChild(card);

new QRCode(document.getElementById("qr"+id),{
text:url,
width:180,
height:180
});
});

function downloadQR(id,name){
let canvas=document.querySelector("#"+id+" canvas");
if(!canvas)return;
let a=document.createElement("a");
a.href=canvas.toDataURL("image/png");
a.download=name+".png";
a.click();
}
</script>

</body>
</html>
