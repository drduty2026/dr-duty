<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dr Duty</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:url('https://images.unsplash.com/photo-1576091160550-2173dba999ef?q=80&w=1200&auto=format&fit=crop') center/cover no-repeat fixed;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
box-sizing:border-box;
}
.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
backdrop-filter:blur(5px);
}
.card{
position:relative;
z-index:2;
width:100%;
max-width:430px;
padding:28px;
border-radius:30px;
background:rgba(255,255,255,.12);
border:1px solid rgba(255,255,255,.2);
backdrop-filter:blur(12px);
text-align:center;
color:white;
box-sizing:border-box;
}
h1{
font-size:44px;
margin:0;
font-weight:800;
}
.sub{
font-size:18px;
margin-top:8px;
opacity:.95;
}
input,select{
width:100%;
padding:18px;
border:none;
border-radius:18px;
font-size:22px;
text-align:center;
margin-top:20px;
box-sizing:border-box;
}
button,a{
width:100%;
display:block;
text-decoration:none;
padding:18px;
border:none;
border-radius:18px;
font-size:24px;
font-weight:700;
margin-top:18px;
cursor:pointer;
box-sizing:border-box;
color:white;
}
.loginBtn{background:linear-gradient(90deg,#4ea3ff,#12d8f0);}
.call{background:linear-gradient(90deg,#0f55ff,#26d9ff);}
.whatsapp{background:#2cff00;}
.spec{
font-size:28px;
color:#28dcff;
font-weight:700;
margin-top:10px;
}
.phone,.hospital,.updated{
margin-top:10px;
font-size:20px;
}
.small{
margin-top:16px;
font-size:14px;
opacity:.9;
}
#hospitalBox,#infoBox{display:none;}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="card">

<!-- LOGIN -->
<div id="loginBox">
<h1>Dr_Duty</h1>
<div class="sub">Medical On-Call Portal</div>

<input type="password" id="pass" placeholder="Password">

<button class="loginBtn" onclick="login()">Login</button>

<div class="small">Authorized Doctors Only</div>
</div>

<!-- HOSPITAL SELECT -->
<div id="hospitalBox">
<h1>Select</h1>
<div class="sub">Choose Hospital</div>

<select id="hospitalSelect"></select>

<button class="loginBtn" onclick="loadDuty()">Continue</button>
</div>

<!-- INFO -->
<div id="infoBox">

<h1 id="doctorName">Doctor</h1>

<div class="spec" id="specName">Specialty</div>

<div class="phone" id="phoneText">---</div>

<div class="hospital" id="hospitalText">---</div>

<a id="callBtn" class="call" href="#">📞 Call</a>

<a id="waBtn" class="whatsapp" href="#" target="_blank">💬 WhatsApp</a>

<div class="updated" id="updatedText"></div>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

const PASSWORD = "54321dr";

const firebaseConfig = {
apiKey: "AIzaSyDQqQpACfdiq-i1q-hv9auGjEkSeHhMIuc",
authDomain: "dr-duty.firebaseapp.com",
projectId: "dr-duty",
storageBucket: "dr-duty.firebasestorage.app",
messagingSenderId: "1051471488231",
appId: "1:1051471488231:web:d9abfafee31373ec826e42"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const params = new URLSearchParams(location.search);
const spec = params.get("spec") || "Unknown";

function login(){

if(pass.value !== PASSWORD){
alert("Wrong Password");
return;
}

loginBox.style.display="none";
hospitalBox.style.display="block";

loadHospitals();

}

function loadHospitals(){

hospitalSelect.innerHTML="";

db.collection("Hospitals").get().then(snap=>{

snap.forEach(doc=>{

hospitalSelect.innerHTML +=
'<option value="'+doc.id+'">'+doc.id+'</option>';

});

});

}

function loadDuty(){

hospitalBox.style.display="none";
infoBox.style.display="block";

let hospital = hospitalSelect.value;

specName.innerText = spec;

db.collection("Duties").doc(spec).get().then(doc=>{

if(doc.exists){

let d = doc.data();

doctorName.innerText = d.name || "Doctor";
phoneText.innerText = d.phone || "---";
hospitalText.innerText = hospital;

callBtn.href = "tel:" + (d.phone || "");

let num = (d.phone || "").replace(/\D/g,'');

if(num.startsWith("0")){
num = "964" + num.substring(1);
}

waBtn.href = "https://wa.me/" + num;

let now = new Date();

updatedText.innerText =
"Updated: " +
now.getDate()+"/"+
(now.getMonth()+1)+"/"+
now.getFullYear();

}else{

doctorName.innerText="No Data";
phoneText.innerText="---";
hospitalText.innerText=hospital;

}

});

}

</script>

</body>
</html>
