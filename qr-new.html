<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dr Duty QR Codes</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
margin:0;
padding:25px;
font-family:Arial,sans-serif;
background:#081226;
color:#fff;
text-align:center;
}
h1{font-size:52px;margin:0 0 10px}
p{font-size:22px;color:#aaa;margin:0 0 30px}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:22px;
}

.card{
background:#fff;
color:#000;
padding:18px;
border-radius:20px;
}

.name{
font-size:22px;
font-weight:bold;
margin-bottom:12px;
}

.qr{
display:flex;
justify-content:center;
}
</style>
</head>

<body>

<h1>Dr Duty QR Codes</h1>
<p>33 Updated Departments</p>

<div class="grid" id="grid"></div>

<script>
const departments = [
"Emergency Medicine","Surgery","Internal Medicine","Pediatrics","Cardiology",
"Orthopedic","Neurology","ENT","Ophthalmology","Dermatology",
"Radiology","Urology","Nephrology","Oncology","Psychiatry",
"Dental","Family Medicine","Pulmonary","Gastroenterology","Endocrinology",
"Rheumatology","Hematology","Infectious Disease","Plastic Surgery","Neurosurgery",
"Vascular Surgery","Thoracic Surgery","Gynecology","Obstetrics","Pathology",
"Laboratory","ICU","Anesthesia"
];

const base="https://drduty2026.github.io/dr-duty/portal.html?spec=";
const grid=document.getElementById("grid");

departments.forEach(dep=>{
let id=dep.replace(/\s/g,"");
let url=base+encodeURIComponent(dep);

let card=document.createElement("div");
card.className="card";
card.innerHTML=
<div class="name">${dep}</div>
<div class="qr" id="qr${id}"></div>
;

grid.appendChild(card);

new QRCode(document.getElementById("qr"+id),{
text:url,
width:180,
height:180
});
});
</script>

</body>
</html>
