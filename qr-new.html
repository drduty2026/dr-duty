<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Doctor Duty</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#081a35;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
box-sizing:border-box;
}
.card{
width:100%;
max-width:430px;
background:#10284f;
border-radius:22px;
padding:25px;
box-shadow:0 0 20px rgba(0,0,0,.35);
text-align:center;
}
h1{
margin:0 0 18px;
font-size:28px;
}
h2{
margin:0 0 20px;
font-size:22px;
color:#8ec5ff;
}
.row{
background:#173764;
padding:14px;
border-radius:14px;
margin-top:12px;
font-size:18px;
}
.label{
display:block;
font-size:14px;
opacity:.8;
margin-bottom:4px;
}
.big{
font-size:22px;
font-weight:bold;
}
.actions{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:18px;
}
button,a.btn{
border:none;
text-decoration:none;
display:flex;
justify-content:center;
align-items:center;
padding:14px;
border-radius:14px;
font-size:17px;
font-weight:bold;
cursor:pointer;
color:white;
}
.call{background:#16a34a;}
.whatsapp{background:#25D366;}
.footer{
margin-top:16px;
font-size:13px;
opacity:.75;
}
.loading{
font-size:18px;
padding:20px;
}
</style>
</head>

<body>

<div class="card">

<div id="loading" class="loading">Loading...</div>

<div id="content" style="display:none;">

<h1 id="specTitle">Specialty</h1>

<h2>On Duty Doctor</h2>

<div class="row">
<span class="label">Doctor Name</span>
<div class="big" id="doctorName">-</div>
</div>

<div class="row">
<span class="label">Phone Number</span>
<div class="big" id="doctorPhone">-</div>
</div>

<div class="row">
<span class="label">Hospital</span>
<div class="big" id="doctorHospital">-</div>
</div>

<div class="actions">
<a id="callBtn" class="btn call" href="#">Call</a>
<a id="waBtn" class="btn whatsapp" href="#" target="_blank">WhatsApp</a>
</div>

<div class="footer" id="updatedText"></div>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyDQqQpACfdiq-i1q-hv9auGjEkSeHhMIuc",
authDomain: "dr-duty.firebaseapp.com",
projectId: "dr-duty",
storageBucket: "dr-duty.firebasestorage.app",
messagingSenderId: "1051471488231",
appId: "1:1051471488231:web:d9abfafee31373ec826e42"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* GET SPEC FROM URL */
const params = new URLSearchParams(location.search);
const spec = params.get("spec");

/* IF EMPTY */
if(!spec){
document.getElementById("loading").innerHTML="No specialty selected";
}else{

db.collection("Duties").doc(spec).get().then(doc=>{

document.getElementById("loading").style.display="none";
document.getElementById("content").style.display="block";

document.getElementById("specTitle").innerText=spec;

if(doc.exists){

let d=doc.data();

let name=d.name || "-";
let phone=d.phone || "-";
let hospital=d.hospital || "-";

document.getElementById("doctorName").innerText=name;
document.getElementById("doctorPhone").innerText=phone;
document.getElementById("doctorHospital").innerText=hospital;

document.getElementById("callBtn").href="tel:"+phone;

let wa = phone.replace(/\D/g,'');

/* IRAQ FORMAT */
if(wa.startsWith("0")){
wa="964"+wa.substring(1);
}

document.getElementById("waBtn").href=
"https://wa.me/"+wa;

document.getElementById("updatedText").innerText=
"Last Updated";

}else{

document.getElementById("doctorName").innerText="No Data";
document.getElementById("doctorPhone").innerText="-";
document.getElementById("doctorHospital").innerText="-";
document.getElementById("callBtn").style.display="none";
document.getElementById("waBtn").style.display="none";

}

});

}

</script>

</body>
</html>
