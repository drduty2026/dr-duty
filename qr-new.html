<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dr Duty QR</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:url('https://images.unsplash.com/photo-1584515933487-779824d29309?q=80&w=1200&auto=format&fit=crop') center/cover no-repeat fixed;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
box-sizing:border-box;
}
.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
backdrop-filter:blur(4px);
}
.card{
position:relative;
z-index:2;
width:100%;
max-width:430px;
padding:28px;
border-radius:28px;
background:rgba(255,255,255,.10);
border:1px solid rgba(255,255,255,.18);
backdrop-filter:blur(10px);
text-align:center;
color:white;
box-sizing:border-box;
}
h1{
margin:0;
font-size:42px;
font-weight:800;
}
.spec{
margin-top:8px;
font-size:28px;
font-weight:700;
color:#27d9ff;
}
.phone{
margin-top:16px;
font-size:22px;
}
.hospital{
margin-top:10px;
font-size:18px;
opacity:.95;
}
.btn{
display:block;
text-decoration:none;
color:white;
font-size:26px;
font-weight:700;
padding:18px;
border-radius:20px;
margin-top:18px;
}
.call{
background:linear-gradient(90deg,#0f55ff,#26d9ff);
}
.whatsapp{
background:#2cff00;
}
.updated{
margin-top:18px;
font-size:16px;
opacity:.95;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="card">

<h1 id="doctorName">Dr_Duty</h1>

<div class="spec" id="specName">Loading...</div>

<div class="phone" id="phoneText">---</div>

<div class="hospital" id="hospitalText">---</div>

<a id="callBtn" class="btn call" href="#">📞 Call</a>

<a id="waBtn" class="btn whatsapp" href="#" target="_blank">💬 WhatsApp</a>

<div class="updated" id="updatedText">Updated</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyDQqQpACfdiq-i1q-hv9auGjEkSeHhMIuc",
authDomain: "dr-duty.firebaseapp.com",
projectId: "dr-duty",
storageBucket: "dr-duty.firebasestorage.app",
messagingSenderId: "1051471488231",
appId: "1:1051471488231:web:d9abfafee31373ec826e42"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* GET SPEC */
const params = new URLSearchParams(location.search);
const spec = params.get("spec") || "Unknown";

specName.innerText = spec;

/* LOAD DATA */
db.collection("Duties").doc(spec).get().then(doc=>{

if(doc.exists){

let d = doc.data();

doctorName.innerText = d.name || "Dr_Duty";

phoneText.innerText = d.phone || "---";

hospitalText.innerText = d.hospital || "---";

callBtn.href = "tel:" + (d.phone || "");

let num = (d.phone || "").replace(/\D/g,'');

if(num.startsWith("0")){
num = "964" + num.substring(1);
}

waBtn.href = "https://wa.me/" + num;

let now = new Date();

updatedText.innerText =
"Updated: " +
now.getDate()+"/"+
(now.getMonth()+1)+"/"+
now.getFullYear();

}else{

doctorName.innerText="No Doctor";
phoneText.innerText="---";
hospitalText.innerText="No Hospital";

}

});

</script>

</body>
</html>
