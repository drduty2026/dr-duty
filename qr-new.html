<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Dr Duty</title>

<style>

body{

margin:0;
padding:0;
font-family:Arial;
background:url('https://images.unsplash.com/photo-1584982751601-97dcc096659c?q=80&w=1200&auto=format&fit=crop')
center/cover no-repeat fixed;

height:100vh;

display:flex;
justify-content:center;
align-items:center;

}

.overlay{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:rgba(0,0,0,0.55);

}

.box{

position:relative;
z-index:2;

width:340px;

padding:30px;

border-radius:25px;

backdrop-filter:blur(15px);

background:rgba(255,255,255,0.08);

border:1px solid rgba(255,255,255,0.2);

text-align:center;

color:white;

}

h1{

margin-top:0;
font-size:42px;

}

input,
select{

width:100%;
padding:16px;

margin-top:15px;

border:none;
border-radius:14px;

font-size:18px;

}

button{

width:100%;
padding:16px;

margin-top:20px;

border:none;
border-radius:14px;

font-size:20px;
font-weight:bold;

cursor:pointer;

color:white;

background:linear-gradient(
45deg,
#0072ff,
#00c6ff
);

}

.card{

display:none;

}

.name{

font-size:42px;
font-weight:bold;

}

.spec{

font-size:30px;
color:#00c6ff;

margin-top:10px;

}

.phone{

font-size:28px;

margin-top:10px;

}

.hospital{

font-size:24px;
opacity:0.9;

margin-top:10px;

}

.callBtn{

background:linear-gradient(
45deg,
#0072ff,
#00c6ff
);

}

.whatsappBtn{

background:#19e600;

}

</style>

</head>

<body>

<div class="overlay"></div>

<div class="box"
id="loginBox">

<h1>Dr Duty</h1>

<input
type="password"
id="password"
placeholder="Password">

<button
onclick="login()">

Login

</button>

</div>

<div class="box"
id="hospitalBox"
style="display:none;">

<h1>Select Hospital</h1>

<select id="hospital">

<option>
Al-Mawani General Hospital
</option>

<option>
Basra Teaching Hospital
</option>

<option>
Al-Faihaa Hospital
</option>

<option>
Al-Sadr Teaching Hospital
</option>

</select>

<button
onclick="loadDoctor()">

Continue

</button>

</div>

<div class="box card"
id="doctorBox">

<div
class="name"
id="doctorName">

</div>

<div
class="spec"
id="doctorSpecialty">

</div>

<div
class="phone"
id="doctorPhone">

</div>

<div
class="hospital"
id="doctorHospital">

</div>

<button
class="callBtn"
id="callBtn">

📞 Call

</button>

<button
class="whatsappBtn"
id="whatsappBtn">

💬 WhatsApp

</button>

</div>

<script type="module">

import {
initializeApp
}

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs
}

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:
"ضع apiKey هنا",

authDomain:
"dr-duty.firebaseapp.com",

projectId:
"dr-duty",

storageBucket:
"dr-duty.appspot.com",

messagingSenderId:
"1051471488231",

appId:
"ضع appId هنا"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

const params =
new URLSearchParams(
window.location.search
);

const specialty =
params.get("spec");

window.login =
function(){

const password =
document.getElementById(
"password"
).value;

if(password === "1234"){

document.getElementById(
"loginBox"
).style.display = "none";

document.getElementById(
"hospitalBox"
).style.display = "block";

}else{

alert("Wrong Password");

}

};

window.loadDoctor =
async function(){

const hospital =
document.getElementById(
"hospital"
).value;

const snapshot =
await getDocs(
collection(
db,
"duty_doctors"
)
);

let found = false;

snapshot.forEach((doc)=>{

const data = doc.data();

const firebaseHospital =
data.hospital
.toLowerCase()
.replace(/\s/g,'');

const selectedHospital =
hospital
.toLowerCase()
.replace(/\s/g,'');

if(

data.specialty === specialty &&

firebaseHospital.includes(
selectedHospital
.substring(0,8)
)

){

found = true;

document.getElementById(
"hospitalBox"
).style.display = "none";

document.getElementById(
"doctorBox"
).style.display = "block";

document.getElementById(
"doctorName"
).innerText =
data.doctorName;

document.getElementById(
"doctorSpecialty"
).innerText =
data.specialty;

document.getElementById(
"doctorPhone"
).innerText =
data.phone;

document.getElementById(
"doctorHospital"
).innerText =
data.hospital;

document.getElementById(
"callBtn"
).onclick = function(){

window.location.href =
`tel:0${data.phone}`;

};

document.getElementById(
"whatsappBtn"
).onclick = function(){

window.location.href =
`https://wa.me/964${data.phone}`;

};

}

});

if(!found){

alert("No Doctor Found");

}

};

</script>

</body>
</html>
