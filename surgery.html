<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surgery</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url('https://images.unsplash.com/photo-1584515933487-779824d29309?auto=format&fit=crop&w=1400&q=80') center/cover no-repeat;
}
.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,.35);
}
.card{
position:relative;
z-index:2;
width:420px;
padding:35px;
border-radius:30px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(12px);
box-shadow:0 0 30px #00bfff;
text-align:center;
color:#fff;
}
h1{font-size:52px;margin-bottom:10px;}
h2{font-size:28px;color:#7df9ff;margin-bottom:25px;}
input{
width:100%;
padding:18px;
font-size:28px;
border:none;
border-radius:16px;
margin-bottom:20px;
text-align:center;
}
button{
width:100%;
padding:18px;
font-size:30px;
border:none;
border-radius:16px;
background:linear-gradient(90deg,#1e90ff,#00ffff);
color:#fff;
font-weight:bold;
}
.note{margin-top:18px;font-size:20px;}
</style>
</head>

<body>
<div class="overlay"></div>

<div class="card">
<h1>Dr_Duty</h1>
<h2>Surgery</h2>

<input type="password" id="pass" placeholder="كلمة المرور">

<button onclick="go()">دخول</button>

<div class="note">Authorized Doctors Only</div>
</div>

<script>
function go(){
if(document.getElementById("pass").value=="11223344"){
window.location.href="portal.html";
}else{
alert("كلمة المرور غير صحيحة");
}
}
</script>

</body>
</html>
